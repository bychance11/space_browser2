<style>
  :root{
    --fg:#e9edfa; --fg-dim:#94a1c4; --panel:rgba(12,16,32,.55); --line:rgba(255,255,255,.09);
    --accent:#8ab8ff; --glow:rgba(96,140,255,.28); --shadow:rgba(0,0,0,.35);
  }
  body.light{
    --fg:#2e2820; --fg-dim:#8d8271; --panel:rgba(255,253,247,.62); --line:rgba(60,45,20,.13);
    --accent:#b0641e; --glow:rgba(190,120,40,.2); --shadow:rgba(80,60,30,.18);
  }
  *{box-sizing:border-box; margin:0}
  html,body{height:100%; overflow:hidden; background:#04060f}
  body{font-family:'Inter','Noto Sans KR','Apple SD Gothic Neo',sans-serif; color:var(--fg)}
  body, .panel, input, button{transition:color 5s, background-color 5s, border-color 5s, box-shadow 5s}
  #c{position:fixed; inset:0; display:block}
  .panel{position:fixed; background:var(--panel); border:1px solid var(--line); border-radius:16px;
    backdrop-filter:blur(18px) saturate(1.5); -webkit-backdrop-filter:blur(18px) saturate(1.5);
    box-shadow:0 8px 32px var(--shadow), inset 0 1px 0 rgba(255,255,255,.06); padding:10px 16px}
  #topbar{top:16px; left:50%; transform:translateX(-50%); display:flex; gap:8px; align-items:center; z-index:10; border-radius:999px; padding:8px 10px}
  #topbar input{width:min(420px,52vw); background:rgba(0,0,0,.001); border:1px solid var(--line); border-radius:999px; color:var(--fg); padding:8px 16px; font-size:13px; outline:none; font-family:inherit}
  #topbar input::placeholder{color:var(--fg-dim)}
  #topbar input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--glow)}
  button{background:transparent; color:var(--fg); border:1px solid var(--line); border-radius:999px; padding:8px 16px; font-size:13px; cursor:pointer; font-family:inherit; font-weight:600}
  button:hover{border-color:var(--accent); color:var(--accent); box-shadow:0 0 18px var(--glow)}
  #modeBtn{font-weight:700; min-width:120px}
  #info{left:14px; bottom:14px; max-width:300px; font-size:12.5px; line-height:1.55; display:none; z-index:10}
  #info h3{font-size:14px; margin-bottom:4px; word-break:break-all}
  #info a{color:var(--accent)}
  #info .dim{color:var(--fg-dim)}
  #filters{left:14px; top:76px; width:236px; max-height:calc(100vh - 300px); overflow-y:auto; font-size:12px; z-index:10}
  #filters h4{font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--fg-dim); margin:12px 0 6px}
  #filters h4:first-child{margin-top:2px}
  #filters select{width:100%; background:transparent; color:var(--fg); border:1px solid var(--line); border-radius:8px; padding:6px 8px; font-size:12px; font-family:inherit; outline:none}
  #filters select option, #filters select optgroup{background:#141a2e; color:#dfe6f5}
  body.light #filters select option, body.light #filters select optgroup{background:#faf7f0; color:#2e2820}
  .chip{display:inline-block; padding:3px 9px; border:1px solid var(--line); border-radius:999px; margin:0 4px 5px 0; cursor:pointer; font-size:10.5px; color:var(--fg-dim); user-select:none}
  .chip.on{color:var(--accent); border-color:var(--accent); background:var(--glow)}
  #legendSec{font-size:11px; line-height:1.7; color:var(--fg-dim)}
  #legendSec b{color:var(--fg)}
  #related{right:14px; bottom:14px; width:310px; max-height:46vh; overflow-y:auto; font-size:12px; display:none; z-index:10}
  #related h4{font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--fg-dim); margin-bottom:4px}
  #related ol{margin:4px 0 0 18px; padding:0}
  #related li{margin-bottom:9px; cursor:pointer; line-height:1.45}
  #related li:hover .rname{color:var(--accent)}
  #related .rname{font-weight:600; word-break:break-all}
  #related .rmeta{color:var(--fg-dim); font-size:10.5px}
  #related .rsum{color:var(--fg-dim); font-size:11px}
  #hint{top:72px; left:50%; transform:translateX(-50%); font-size:11px; color:var(--fg-dim); z-index:9; padding:5px 14px; border-radius:999px; letter-spacing:.01em}
  #loading{position:fixed; inset:0; display:flex; flex-direction:column; gap:12px; align-items:center; justify-content:center; z-index:20; color:#9fb3dd; font-size:14px; background:#04060f}
  #entry{position:fixed; inset:0; z-index:40; display:flex; align-items:center; justify-content:center; background:radial-gradient(ellipse at 50% 40%, rgba(10,16,40,.92), rgba(4,6,15,.97))}
  .ecard{max-width:520px; padding:44px 48px; text-align:center; border:1px solid rgba(255,255,255,.1); border-radius:24px; background:rgba(12,16,32,.6); backdrop-filter:blur(20px); box-shadow:0 20px 80px rgba(0,0,0,.5)}
  .ecard h1{font-size:30px; font-weight:800; letter-spacing:.02em; margin-bottom:14px; color:#eef2ff}
  .ecard p{font-size:14px; line-height:1.8; color:#9fb0d8; margin-bottom:22px}
  .econtrols{display:inline-block; text-align:left; margin:0 auto 26px}
  .ctrl{display:flex; gap:12px; align-items:center; margin:8px 0; font-size:12.5px; color:#93a3c8}
  .kbd{flex:none; min-width:96px; text-align:center; padding:4px 12px; border:1px solid rgba(255,255,255,.18); border-bottom-width:2px; border-radius:8px; background:rgba(255,255,255,.05); font-size:11.5px; font-weight:600; color:#c7d4f5; white-space:nowrap}
  .elangs{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:26px}
  .elang{padding:7px 16px; border:1px solid rgba(255,255,255,.14); border-radius:999px; font-size:13px; color:#aab8dd; cursor:pointer; user-select:none}
  .elang.on{color:#8ab8ff; border-color:#8ab8ff; background:rgba(96,140,255,.14)}
  #eStart{font-size:15px; font-weight:700; padding:12px 46px; border-radius:999px; border:1px solid #8ab8ff; color:#eef2ff; background:linear-gradient(135deg, rgba(96,140,255,.35), rgba(140,96,255,.3)); cursor:pointer}
  #eStart:hover{box-shadow:0 0 30px rgba(96,140,255,.45)}
  .lbl{position:fixed; transform:translate(-50%,-130%); font-size:11px; pointer-events:none; white-space:nowrap; color:var(--fg); text-shadow:0 0 6px rgba(0,0,0,.5); z-index:5}
  body.light .lbl{text-shadow:0 0 6px rgba(255,255,255,.7)}
  .glbl{position:fixed; transform:translate(-50%, calc(-50% + 36px)); font-size:60px; font-weight:800; letter-spacing:.22em; pointer-events:none; white-space:nowrap; color:var(--fg-dim); opacity:.38; z-index:1; transition:opacity 2.5s; text-transform:uppercase}
  .glbl::after{content:''; display:block; margin:6px auto 0; width:55%; height:2px; background:linear-gradient(90deg,transparent,var(--fg-dim),transparent); opacity:.35}
  .lbl.sel{font-weight:700; font-size:12.5px; color:var(--accent)}
  .plbl{position:fixed; transform:translate(-50%,-140%); pointer-events:none; white-space:nowrap; z-index:5; color:var(--fg); text-shadow:0 0 6px rgba(0,0,0,.55)}
  body.light .plbl{text-shadow:0 0 6px rgba(255,255,255,.75)}
  .plbl .lk{opacity:.75; font-weight:400; font-size:.82em}
  .p0{font-size:16.5px; font-weight:800; letter-spacing:.02em}
  .p1{font-size:12px; font-weight:600; opacity:.78}
  .p2{font-size:10px; opacity:.38}
  body.light .p1{opacity:.9}
  body.light .p2{opacity:.6}
  .hoverbox{position:fixed; transform:translate(-50%,-135%); z-index:12; pointer-events:none; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:8px 11px; font-size:12.5px; line-height:1.5; max-width:340px; white-space:normal; backdrop-filter:blur(8px)}
  .hoverbox .dim,.hoverbox .sum{color:var(--fg-dim)}
  .hoverbox .sum{font-size:11.5px; margin-top:3px}
</style>
</head>
<body class="dark">
<canvas id="c"></canvas>
<div id="entry">
  <div class="ecard">
    <h1>🤗 Space Browser</h1>
    <p id="ePurpose"></p>
    <div id="eControls" class="econtrols"></div>
    <div class="elangs" id="eLangs">
      <span class="elang on" data-l="en">English</span>
      <span class="elang" data-l="ko">한국어</span>

      <span class="elang" data-l="zh">中文</span>

    <button id="eStart">Start</button>
  </div>
</div>

<div id="topbar" class="panel">

  <button id="modeBtn">⇄ 도메인 우주로</button>
</div>
<div id="hint" class="panel">클릭 = 이동 · Ctrl+클릭 = HF 열기 · WASD = 유영(Shift 가속) · 전환 = 별들이 태스크⇄도메인 별자리로 재배치</div>
<div id="info" class="panel"></div>
<div id="filters" class="panel">

  <select id="galaxySel"></select>
  <h4 id="fhMem"></h4>
  <select id="memSel"></select>
  <h4 id="fhLic"></h4>
  <select id="licSel"></select>
  <h4 id="fhAge"></h4>
  <select id="ageSel"></select>
  <h4 id="fhLang"></h4>
  <select id="langSel"></select>

  <h4 id="fhTags"></h4>
  <div id="tagChips"></div>
  <h4 id="fhLegend"></h4>
  <div id="legendSec"></div>
</div>
<div id="related" class="panel"><h4 id="relTitle"></h4><ol id="relList"></ol></div>

  {tag:'text-generation',              name:'텍스트 생성',   center:[-150, 15,-25], hue:210},

  {tag:'image-to-text',                name:'이미지→텍스트', center:[ 10, 25, 30], hue:280}, // Vision-NLP 다리

TASKS.forEach(t=>t.center=t.center.map(v=>v*SPREAD));

/* ================= 도메인 추론 ================= */
function inferDomain(m){
  const t = (m.id + ' ' + m.tags.join(' ')).toLowerCase();
  const langCodes = m.tags.filter(x=>/^[a-z]{2}$/.test(x)).length;
  if(/(^|[^a-z])(code|coder|sql|starcoder|codellama|codegen)/.test(t)) return 'code';
  if(/(medic|biomed|bio[^a-z]|clinic|pubmed|protein|chem|health|drug)/.test(t)) return 'bio';
  if(/(legal|law[^a-z]|finance|financial|fingpt|stock)/.test(t)) return 'lawfin';
  if(/(math|theorem|physics|science|reason)/.test(t)) return 'sci';
  if(/(music|sing)/.test(t) || m.pipe==='automatic-speech-recognition' || m.pipe==='text-to-speech' || /(whisper|speech|voice|vits|tts)/.test(t)) return 'voice';
  if(m.pipe==='sentence-similarity' || /(embed|rerank|retrieval|bge-|gte-|e5-)/.test(t)) return 'embed';
  if(/(anime|waifu|cartoon|comic|artstyle|dreambooth|photoreal)/.test(t)) return 'art';
  if(langCodes>2 || m.pipe==='translation' || /(multilingual|korean|japanese|chinese)/.test(t)) return 'multi';
  if(m.tags.includes('conversational') || /(instruct|chat|assistant)/.test(t)) return 'chat';
  return 'gen';
}

/* ================= 유틸 ================= */
const STOP = /^(transformers|pytorch|tf|jax|safetensors|onnx|gguf|diffusers|endpoints_compatible|text-generation-inference|text-embeddings-inference|autotrain_compatible|eval-results|model-index|region:.*|license:.*|deploy:.*|base_model:.*|dataset:.*|arxiv:.*)$/;
function parseModel(raw){
  const tags = raw.tags||[];
  const fam = tags.filter(x=>x.startsWith('base_model:')&&!x.includes(':finetune:')&&!x.includes(':quantized:')&&!x.includes(':adapter:')&&!x.includes(':merge:')).map(x=>x.slice(11));
  return {
    id: raw.id, author: raw.id.split('/')[0], dl: raw.downloads||0, likes: raw.likes||0,
    pipe: raw.pipeline_tag, tags, created: (raw.createdAt||'').slice(0,4),
    ctime: Date.parse(raw.createdAt||'')||0,
    lic: (tags.find(x=>x.startsWith('license:'))||'').slice(8),
    family: fam[0] || raw.id,
    datasets: new Set(tags.filter(x=>x.startsWith('dataset:')).map(x=>x.slice(8))),
    arxivs: new Set(tags.filter(x=>x.startsWith('arxiv:'))),
    info: new Set(tags.filter(x=>!STOP.test(x))),
  };
}
function discPos(center, rank, n, rng){ // 은하 원반: 상위 모델일수록 중심 (중심부는 트렌딩 1위 자리라 비움)
  const r = 16 + 40*Math.pow(rank/Math.max(n-1,1), .72);
  const a = rank*2.399963 + r*.05 + rng*6.28;
  return [center[0]+r*Math.cos(a), center[1]+(rng-.5)*2*(4+r*.12), center[2]+r*Math.sin(a)];
}
function hsl(h,s,l){ const c=new THREE.Color(); c.setHSL(h/360,s,l); return c; }
function mulberry(seed){ return ()=>{ seed|=0; seed=seed+0x6D2B79F5|0; let z=Math.imul(seed^seed>>>15,1|seed); z=z+Math.imul(z^z>>>7,61|z)^z; return ((z^z>>>14)>>>0)/4294967296; }; }
const rng = mulberry(42);

/* ================= 데이터 수집 (HF API, CORS 허용) ================= */
let STARS = [];
async function loadData(){
  // 다운로드 상위(구조) + 트렌딩 상위(위계)를 태스크별로 동시 수집
  const dlQ = Promise.allSettled(TASKS.map(t=>fetch(`https://huggingface.co/api/models?filter=${t.tag}&sort=downloads&limit=${PER_TASK}`).then(r=>r.json())));
  const trQ = Promise.allSettled(TASKS.map(t=>fetch(`https://huggingface.co/api/models?filter=${t.tag}&sort=trendingScore&limit=${TREND_N}`).then(r=>r.json())));
  const lkQ = Promise.allSettled(TASKS.map(t=>fetch(`https://huggingface.co/api/models?filter=${t.tag}&sort=likes&limit=20`).then(r=>r.json()))); // 사랑받는 고전 = 중간 항성 후보
  const [dlR, trR, lkR] = await Promise.all([dlQ, trQ, lkQ]);
  const byId = new Map();
  const absorb = (res, gi)=>{
    if(res.status!=='fulfilled' || !Array.isArray(res.value)) return;
    res.value.forEach(raw=>{
      let m = byId.get(raw.id);
      if(!m){ m=parseModel(raw); m.gA=gi; m.trend=raw.trendingScore||0; m.seed=rng(); byId.set(raw.id,m); }
      else m.trend = Math.max(m.trend, raw.trendingScore||0);
    });
  };
  dlR.forEach(absorb); trR.forEach(absorb); lkR.forEach(absorb);
  STARS = [...byId.values()];
  if(STARS.length < 50) throw new Error('API 응답 부족');
  STARS.forEach(m=>{ m.gB = DOMAINS.findIndex(d=>d.key===inferDomain(m)); });
  layoutUniverse('A'); layoutUniverse('B');
  STARS.forEach(m=>{
    m.planet = (m.rankA<5 || m.rankB<5)? 1:0; // 행성 = 트렌딩 순위 (크기와 무관)
    m.heat = m.planet? Math.max(0, 1 - Math.min(m.rankA, m.rankB)*0.19) : 0; // 1위=1.0 → 5위=0.24
    m.size = starSize(m);
    m.delay = (m.gA/TASKS.length)*.34 + Math.min(m.rankA/PER_TASK,1)*.18 + m.seed*.06; // 은하별 물결 + 순위 스태거
    m.colA = hsl(TASKS[m.gA].hue, .75, m.rankA<5?.85:.72);   // 태스크 우주: 태스크 색
    m.colB = hsl(DOMAINS[m.gB].hue, .8, m.rankB<5?.85:.72);  // 도메인 우주: 도메인 색 (같은 밤하늘)
  });
}
function rankBoost(r){ return r===0? 130 : r<5? 85-9*r : 0; } // 1위=지구급(반지름 5배), 2~5위=위성은하급
function baseSize(m){ // 일반 별: 다운로드·좋아요 중 높은 쪽 → 1.2(별먼지급) ~ 14(중간 항성)
  const t = Math.max(Math.min(1, Math.log10(m.dl+1)/8.3), Math.min(1, Math.log10(m.likes+1)/4.8));
  return 1.2 + Math.pow(t, 1.8)*13;
}
function starSize(m){
  return m.planet? Math.max(rankBoost(m.rankA), rankBoost(m.rankB)) : baseSize(m);
}
function affinity(a,b){ // 배치용 연관성 (중력 역할)
  let s=0;
  if(a.family===b.family || a.family===b.id || b.family===a.id) s+=6;
  if(a.author===b.author) s+=3;
  a.datasets.forEach(x=>{ if(b.datasets.has(x)) s+=1.5; });
  let ov=0; a.info.forEach(x=>{ if(b.info.has(x)) ov++; }); s+=Math.min(ov,4)*.3;
  return s;
}
function layoutUniverse(which){ // 유사 중력 배치: 행성(트렌딩) → 중간 항성(넓게) → 작은 별(항성의 위성)
  const GAL = which==='A'? TASKS : DOMAINS;
  GAL.forEach((gal,g)=>{
    const list = STARS.filter(m=> (which==='A'?m.gA:m.gB)===g)
                      .sort((a,b)=> (b.trend-a.trend) || (b.dl-a.dl));
    const ang = g*2.4 + (which==='A'?0:1.3);
    const satC = [gal.center[0]+Math.cos(ang)*100, gal.center[1]+16, gal.center[2]+Math.sin(ang)*100];
    const setPos=(m,i,p)=>{ if(which==='A'){m.posA=p; m.rankA=i;} else {m.posB=p; m.rankB=i;} };
    // 1) 행성: 1위=은하 중심, 2~5위=외곽 위성은하
    list.slice(0,5).forEach((m,i)=>{
      let p;
      if(i===0) p = gal.center.map(v=>v+(m.seed-.5)*4);
      else { const a2=i*1.57+m.seed*6.28;
        p = [satC[0]+Math.cos(a2)*(9+i*2.5), satC[1]+(m.seed-.5)*10, satC[2]+Math.sin(a2)*(9+i*2.5)];
      }
      setPos(m,i,p);
    });
    // 2) 중간 항성 = 앵커: 서로 넓게 벌려 배치
    const others = list.slice(5);
    let anchors = others.filter(m=>baseSize(m)>6.5).slice(0,10);
    if(anchors.length<4) anchors = others.slice(0, Math.min(4, others.length));
    const aset = new Set(anchors);
    const aPos = anchors.map((m,i)=>{
      const r = 36 + 60*Math.pow(i/Math.max(anchors.length-1,1), .8);
      const a2 = i*2.399963 + m.seed*.8;
      return [gal.center[0]+r*Math.cos(a2), gal.center[1]+(m.seed-.5)*2*(6+r*.14), gal.center[2]+r*Math.sin(a2)];
    });
    anchors.forEach((m,i)=>setPos(m, 5+i, aPos[i]));
    // 3) 작은 별: 연관성 높은 항성의 "중력"에 잡혀 위성 궤도, 무연고면 외곽 헤일로
    let idx = 5 + anchors.length;
    others.forEach(m=>{
      if(aset.has(m)) return;
      let bi=-1, bs=0;
      anchors.forEach((anc,i)=>{ const s=affinity(m,anc); if(s>bs){bs=s; bi=i;} });
      let p;
      if(bi>=0 && bs>0){
        const th=m.seed*6.28, rr=5.5+m.seed*10;
        p = [aPos[bi][0]+Math.cos(th)*rr, aPos[bi][1]+(fr(m.seed*13.7)-.5)*rr*.8, aPos[bi][2]+Math.sin(th)*rr];
      } else {
        const th=m.seed*6.28, rr=80+45*fr(m.seed*7.3);
        p = [gal.center[0]+Math.cos(th)*rr, gal.center[1]+(fr(m.seed*3.1)-.5)*28, gal.center[2]+Math.sin(th)*rr];
      }
      setPos(m, idx++, p);
    });
  });
}

const target = new THREE.Vector3(0,0,0);

const VSH = `
attribute vec3 posB; attribute vec3 colA; attribute vec3 colB;
attribute float size; attribute float delay; attribute float seed; attribute float planet; attribute float heat; attribute float vis;
uniform float uT; uniform float uTime; uniform float uPix;
varying vec3 vColor; varying float vSeed; varying float vSize; varying float vPlanet; varying float vHeat; varying float vVis;
void main(){
  float k = clamp((uT - delay)/0.4, 0.0, 1.0);
  float s = k*k*(3.0-2.0*k);
  vec3 arc = normalize(vec3(sin(seed*12.9), cos(seed*7.7), sin(seed*5.3+1.7)));
  float d = distance(position, posB);
  vec3 p = mix(position, posB, s) + arc*sin(3.14159*s)*d*0.28;
  vColor = mix(colA, colB, s); vSeed = seed; vSize = size; vPlanet = planet; vHeat = heat; vVis = vis;
  vec4 mv = modelViewMatrix*vec4(p,1.0);
  float tw = 1.0 + 0.18*sin(uTime*2.2 + seed*80.0)*(1.0-planet); // 행성은 반짝이지 않음
  gl_PointSize = min(size*tw*uPix*140.0/max(-mv.z,1.0), 700.0);
  gl_Position = projectionMatrix*mv;
}`;
const FSH = `
uniform float uAlpha; varying vec3 vColor; varying float vSeed; varying float vSize; varying float vPlanet; varying float vHeat; varying float vVis;
void main(){
  vec2 uv = gl_PointCoord - 0.5;
  float d = length(uv);
  vec3 col; float a;
  if(vPlanet > 0.5){
    // ===== 거대별 = 목성형 행성: 차분한 몸체 + 밝은 대기 테두리 =====
    float R = 0.34;
    float body = smoothstep(R, R-0.012, d);                       // 행성 원반
    float bands = 0.72 + 0.28*sin(uv.y*24.0 + vSeed*40.0 + sin(uv.x*7.0+vSeed*9.0)*0.7); // 위도 줄무늬
    float zsq = max(0.0, R*R - d*d);
    vec3 nrm = normalize(vec3(uv, sqrt(zsq)+0.001));
    float sh = clamp(0.25 + 0.85*dot(nrm, normalize(vec3(-0.45,0.4,0.8))), 0.0, 1.0);   // 구면 음영
    vec3 bodyCol = vColor * bands * sh * 0.5;                     // 어둡고 차분 (블룸 임계 아래)
    // 대기 림: 열기(트렌딩 순위)에 따라 두께·밝기·대기광이 달라짐 + 시드 지터로 개체차
    float jit  = 0.85 + 0.3*fract(vSeed*7.31);
    float w    = mix(70.0, 17.0, vHeat) * jit;                    // 핫할수록 넓고 부드러운 대기
    float rim  = exp(-abs(d-R)*w);
    float rimB = mix(0.35, 1.0, vHeat) * jit;                     // 핫할수록 밝게
    vec3 rimCol = (vColor*mix(0.8,1.6,vHeat) + vec3(mix(0.12,0.6,vHeat))) * rim * rimB;
    float halo = exp(-(d-R)*mix(15.0,6.0,vHeat)) * step(R, d) * mix(0.03,0.3,vHeat);
    col = bodyCol*body + rimCol + vColor*halo;
    a = max(body, rim*rimB*0.9 + halo) * uAlpha;
  } else {
    // ===== 일반 별 (중간 항성은 회절 스파이크) =====
    float core = exp(-d*d*36.0);
    float glow = exp(-d*4.2)*0.5;
    float spikes = 0.0;
    if(vSize > 6.5){
      float s1 = exp(-abs(uv.x)*26.0)*exp(-abs(uv.y)*5.0);
      float s2 = exp(-abs(uv.y)*26.0)*exp(-abs(uv.x)*5.0);
      spikes = (s1+s2)*smoothstep(0.5,0.05,d)*0.7;
    }
    a = clamp(core+glow+spikes, 0.0, 1.0)*uAlpha;
    col = vColor*(0.8+core*1.1) + vec3(1.0)*core*0.4;
  }
  a *= smoothstep(0.5, 0.42, d); // 스프라이트 사각 경계에서 완전 소멸 → 네모 박스 제거
  a *= vVis; // 필터로 숨김
  gl_FragColor = vec4(col, a);
  if(a < 0.02) discard;
}`;
const materials = [];
function makeMat(alpha){
  const m = new THREE.ShaderMaterial({
    uniforms:{uT:{value:0}, uTime:{value:0}, uPix:{value:renderer.getPixelRatio()}, uAlpha:{value:alpha}},
    vertexShader:VSH, fragmentShader:FSH, transparent:true, depthWrite:false,
  });
  materials.push(m); return m;
}
function buildPoints(list, alpha){
  const n = list.length, g = new THREE.BufferGeometry();
  const pA=new Float32Array(n*3), pB=new Float32Array(n*3), cA=new Float32Array(n*3), cB=new Float32Array(n*3);
  const sz=new Float32Array(n), dl=new Float32Array(n), sd=new Float32Array(n), pl=new Float32Array(n), ht=new Float32Array(n), vs=new Float32Array(n);
  list.forEach((m,i)=>{
    pA.set(m.posA,i*3); pB.set(m.posB,i*3);
    cA.set([m.colA.r,m.colA.g,m.colA.b],i*3); cB.set([m.colB.r,m.colB.g,m.colB.b],i*3);
    sz[i]=m.size; dl[i]=m.delay; sd[i]=m.seed; pl[i]=m.planet?1:0; ht[i]=m.heat||0; vs[i]=(m.visible===false)?0:1;
  });
  g.setAttribute('position',new THREE.BufferAttribute(pA,3));
  g.setAttribute('posB',new THREE.BufferAttribute(pB,3));
  g.setAttribute('colA',new THREE.BufferAttribute(cA,3));
  g.setAttribute('colB',new THREE.BufferAttribute(cB,3));
  g.setAttribute('size',new THREE.BufferAttribute(sz,1));
  g.setAttribute('delay',new THREE.BufferAttribute(dl,1));
  g.setAttribute('seed',new THREE.BufferAttribute(sd,1));
  g.setAttribute('planet',new THREE.BufferAttribute(pl,1));
  g.setAttribute('heat',new THREE.BufferAttribute(ht,1));
  g.setAttribute('vis',new THREE.BufferAttribute(vs,1));
  const pts = new THREE.Points(g, makeMat(alpha));
  pts.frustumCulled = false;
  scene.add(pts); return pts;
}
let dustPoints=null, DUST=[];
function buildDust(){ // Tier2 개념: 실별 주변에 뿌리는 별먼지 (양쪽 좌표 모두 실별 기준 지터)
  DUST=[];
  for(let i=0;i<DUST_N;i++){
    const m = STARS[(rng()*STARS.length)|0], j=()=> (rng()-.5)*26;
    const dim = .25+rng()*.3;
    DUST.push({posA:[m.posA[0]+j(),m.posA[1]+j()*.5,m.posA[2]+j()],
               posB:[m.posB[0]+j(),m.posB[1]+j()*.5,m.posB[2]+j()],
               colA:m.colA.clone().multiplyScalar(dim), colB:m.colB.clone().multiplyScalar(dim),
               size:.8+rng()*1.4, delay:m.delay+(rng()-.5)*.08, seed:rng(), src:m});
  }
  dustPoints = buildPoints(DUST, .35);
  return dustPoints;
}

/* ================= 성운 배경 (fBm 노이즈 셰이더) ================= */
let nebulaMat=null, nebulaMesh=null;
function buildNebula(){
  nebulaMat = new THREE.ShaderMaterial({side:THREE.BackSide, depthWrite:false,
    uniforms:{uT:{value:0}, uTime:{value:0}},
    vertexShader:`varying vec3 vP; void main(){vP=normalize(position); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`
      varying vec3 vP; uniform float uT; uniform float uTime;
      float h(vec3 p){return fract(sin(dot(p,vec3(127.1,311.7,74.7)))*43758.5453);}
      float n(vec3 p){vec3 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
        return mix(mix(mix(h(i),h(i+vec3(1,0,0)),f.x),mix(h(i+vec3(0,1,0)),h(i+vec3(1,1,0)),f.x),f.y),
                   mix(mix(h(i+vec3(0,0,1)),h(i+vec3(1,0,1)),f.x),mix(h(i+vec3(0,1,1)),h(i+vec3(1,1,1)),f.x),f.y),f.z);}
      float fbm(vec3 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*n(p);p*=2.13;a*=.5;}return v;}
      float bgStar(vec3 dir, float scale, float dense){ // 셀마다 둥근 점 하나 (원형 미세 별)
        vec3 sp=dir*scale, cell=floor(sp), fr=fract(sp);
        vec3 rp=vec3(h(cell), h(cell+11.3), h(cell+23.7));
        return exp(-length(fr-rp)*13.0) * step(dense, h(cell+37.1));
      }
      void main(){
        // 흑우주: 절제된 딥스페이스 — 거의 검정 + 은하수 띠 + 원형 미세 별
        float f1=fbm(vP*4.0);
        float band=exp(-abs(vP.y + .18*sin(vP.x*2.3))*3.2);           // 은하수 띠
        vec3 dark = vec3(.006,.009,.022)
          + vec3(.045,.05,.075)*band*pow(f1,1.8)                       // 띠 속 뿌연 별빛
          + vec3(.02,.018,.04)*pow(fbm(vP*2.2+31.),3.)*.5;             // 아주 옅은 먼지
        float tw=.75+.25*sin(uTime*1.5+f1*40.);
        dark += vec3(.55,.65,.9)*bgStar(vP,110.,.86)*.32*tw;           // 푸른 미세 별
        dark += vec3(.9,.82,.65)*bgStar(vP,55.,.9)*.42;                // 노란 미세 별
        gl_FragColor = vec4(dark,1.); // 두 우주 모두 같은 딥스페이스 배경
      }`});
  nebulaMesh = new THREE.Mesh(new THREE.SphereGeometry(1900,48,48), nebulaMat);
  nebulaMesh.frustumCulled=false; nebulaMesh.renderOrder=-1; scene.add(nebulaMesh);
}

/* ================= 은하 글로우 (소속 구역 표시) ================= */
let glowsA=[], glowsB=[];
function glowTex(){
  const c=document.createElement('canvas'); c.width=c.height=128;
  const x=c.getContext('2d'), g=x.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0,'rgba(255,255,255,.9)'); g.addColorStop(.4,'rgba(255,255,255,.35)'); g.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=g; x.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}
function buildGlows(){
  const tex=glowTex();
  TASKS.forEach(t=>{ // 흑우주: 은은한 가산 발광 구름
    const s=new THREE.Sprite(new THREE.SpriteMaterial({map:tex, color:hsl(t.hue,.7,.45), transparent:true, opacity:.14, blending:THREE.AdditiveBlending, depthWrite:false}));
    s.position.set(...t.center); s.scale.set(260,170,1); scene.add(s); glowsA.push(s);
  });
  DOMAINS.forEach(d=>{ // 도메인 우주: 같은 방식의 발광 구름
    const s=new THREE.Sprite(new THREE.SpriteMaterial({map:tex, color:hsl(d.hue,.7,.45), transparent:true, opacity:0, blending:THREE.AdditiveBlending, depthWrite:false}));
    s.position.set(...d.center); s.scale.set(260,170,1); scene.add(s); glowsB.push(s);
  });
}

/* ================= 블룸 후처리 (three.js 예제, MIT) ================= */
let composer=null, bloomPass=null;
function setupComposer(){
  try{
    if(!THREE.EffectComposer || !THREE.UnrealBloomPass) return;
    composer = new THREE.EffectComposer(renderer);
    composer.addPass(new THREE.RenderPass(scene, camera));
    bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 1.1, 0.55, 0.8);
    composer.addPass(bloomPass);
  }catch(e){ composer=null; }
}

/* ================= 우주 전환 (흑↔백) ================= */
const BG_DARK = new THREE.Color('#04060f');
let mode = 0;          // 0=흑(태스크), 1=백(도메인)
let uT = 0, transFrom = 0, transStart = -1;
function switchMode(){
  transFrom = uT; transStart = performance.now();
  mode = 1-mode;
  document.getElementById('modeBtn').textContent = mode? T.toTask : T.toDomain;
  galaxyLabels.forEach(l=>{ l.el.style.opacity = (l.uni===mode)? .38 : 0; });
}
function ease01(x){ return x<0?0:x>1?1:x*x*(3-2*x); }
function starPos(m, t, out){ // 셰이더와 동일한 경로를 CPU에서 재현 (라벨·연결선·피킹용)
  const k = ease01((t - m.delay)/0.4);
  const ax=Math.sin(m.seed*12.9), ay=Math.cos(m.seed*7.7), az=Math.sin(m.seed*5.3+1.7);
  const al=Math.sqrt(ax*ax+ay*ay+az*az);
  const dx=m.posB[0]-m.posA[0], dy=m.posB[1]-m.posA[1], dz=m.posB[2]-m.posA[2];
  const d=Math.sqrt(dx*dx+dy*dy+dz*dz), arc=Math.sin(Math.PI*k)*d*0.28/al;
  out.set(m.posA[0]+dx*k+ax*arc, m.posA[1]+dy*k+ay*arc, m.posA[2]+dz*k+az*arc);
  return out;
}

/* ================= 연관 별 연결 ================= */
let selected=null, related=[], lineStrong=null, lineWeak=null, hoverLine=null, hoverLineIdx=-1;
function relScore(a,b){
  let s=0;
  if(a.family===b.family) s+=5;
  if(a.family===b.id || b.family===a.id) s+=6;
  let shared=0; a.datasets.forEach(x=>{if(b.datasets.has(x))shared++;}); s+=Math.min(shared,3)*2;
  let ax=0; a.arxivs.forEach(x=>{if(b.arxivs.has(x))ax++;}); s+=Math.min(ax,2)*2;
  if(a.author===b.author) s+=1.5;
  let ov=0; a.info.forEach(x=>{if(b.info.has(x))ov++;}); s+=Math.min(ov,4)*.35;
  if(a.gA===b.gA) s+=.4;
  if(s<1) return 0;
  return s*(1+Math.log10(b.dl+1)/4); // 연관성 × 인기 가중
}
function select(m){
  selected = m;
  related = STARS.filter(x=>x!==m && x.visible!==false).map(x=>({m:x, s:relScore(m,x)}))
                 .filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,10);
  rebuildLines(); renderInfo(m); renderRelated(); flyTo(m);
}
function rebuildLines(){
  [lineStrong,lineWeak].forEach(l=>{ if(l){scene.remove(l); l.geometry.dispose();} });
  lineStrong=lineWeak=null;
  if(!selected) return;
  const mk=(pairs,op)=>{
    if(!pairs.length) return null;
    const g=new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pairs.length*6),3));
    const l=new THREE.LineSegments(g, new THREE.LineBasicMaterial({color:mode?0x6b5433:0x9db8ee, transparent:true, opacity:op}));
    l.frustumCulled=false; scene.add(l); return l;
  };
  lineStrong = mk(related.filter(r=>r.s>=6), .85);
  lineWeak   = mk(related.filter(r=>r.s<6),  .28);
  hoverLineIdx = -1; if(hoverLine) hoverLine.visible=false;
}
/* 선에 커서를 올리면 그 선을 3중 평행선으로 두껍게 강조 */
function ensureHoverLine(){
  if(hoverLine) return;
  const g=new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(new Float32Array(18),3));
  hoverLine=new THREE.LineSegments(g, new THREE.LineBasicMaterial({transparent:true, opacity:1}));
  hoverLine.frustumCulled=false; scene.add(hoverLine);
}
function segDist(px,py,x1,y1,x2,y2){
  const dx=x2-x1, dy=y2-y1, l2=dx*dx+dy*dy;
  let t=l2? ((px-x1)*dx+(py-y1)*dy)/l2 : 0; t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(x1+dx*t), py-(y1+dy*t));
}
function pickLine(px,py){ // 연결선 근처(7px) 커서 → 반대편 별 반환
  if(!selected || !related.length) return null;
  const w=innerWidth, h=innerHeight;
  const a = starPos(selected,uT,new THREE.Vector3()).project(camera);
  if(a.z>1) return null;
  const ax=(a.x*.5+.5)*w, ay=(-a.y*.5+.5)*h;
  let bi=-1, bd=7;
  const tmp=new THREE.Vector3();
  related.forEach((r,i)=>{
    starPos(r.m,uT,tmp).project(camera);
    if(tmp.z>1) return;
    const d = segDist(px,py, ax,ay, (tmp.x*.5+.5)*w, (-tmp.y*.5+.5)*h);
    if(d<bd){ bd=d; bi=i; }
  });
  return bi>=0? {m:related[bi].m, i:bi} : null;
}
const _v = new THREE.Vector3();
function updateLines(){
  if(!selected) return;
  const sp = starPos(selected, uT, new THREE.Vector3());
  const fill=(line,list)=>{
    if(!line) return;
    const arr=line.geometry.attributes.position.array;
    list.forEach((r,i)=>{ starPos(r.m,uT,_v); arr.set([sp.x,sp.y,sp.z,_v.x,_v.y,_v.z],i*6); });
    line.geometry.attributes.position.needsUpdate=true;
    line.material.color.set(0x9db8ee);
  };
  fill(lineStrong, related.filter(r=>r.s>=6));
  fill(lineWeak,   related.filter(r=>r.s<6));
  ensureHoverLine();
  if(hoverLineIdx>=0 && related[hoverLineIdx]){
    hoverLine.visible = true;
    hoverLine.material.color.set(0x7fb4ff);
    const tp = starPos(related[hoverLineIdx].m, uT, new THREE.Vector3());
    const dir = _v.copy(tp).sub(sp).normalize();
    const camDir = new THREE.Vector3().subVectors(target, camera.position).normalize();
    let off = new THREE.Vector3().crossVectors(dir, camDir);
    if(off.lengthSq()<1e-6) off.crossVectors(dir, camera.up);
    off.normalize().multiplyScalar(camera.position.distanceTo(sp)*0.0035);
    const arr = hoverLine.geometry.attributes.position.array;
    [[0,0,0],[off.x,off.y,off.z],[-off.x,-off.y,-off.z]].forEach((o,i)=>{
      arr.set([sp.x+o[0],sp.y+o[1],sp.z+o[2], tp.x+o[0],tp.y+o[1],tp.z+o[2]], i*6);
    });
    hoverLine.geometry.attributes.position.needsUpdate = true;
  } else hoverLine.visible = false;
}

let starLabels=[], galaxyLabels=[], pLabels=[], selectionIds=new Set();
function addDiv(cls, html){ const e=document.createElement('div'); e.className=cls; e.innerHTML=html; document.body.appendChild(e); return e; }
function fmtK(n){ return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':''+n; }
function makeLabels(){
  TASKS.forEach((t,i)=>galaxyLabels.push({uni:0, gi:i, pos:new THREE.Vector3(...t.center), el:addDiv('glbl',gNameA(i))}));
  DOMAINS.forEach((d,i)=>galaxyLabels.push({uni:1, gi:i, pos:new THREE.Vector3(...d.center), el:addDiv('glbl',gNameB(i))}));
  galaxyLabels.forEach(l=>{ l.el.style.opacity = l.uni===0? .38:0; });
}
function galaxyLabelHidden(l){
  if(!activeGalaxy) return false;
  return !((activeGalaxy.uni==='A'?0:1)===l.uni && activeGalaxy.gi===l.gi);
}
function makePersistentLabels(){ // 주요 별 상시 라벨: 클수록 크고 진하게, 하위 티어는 없음
  const done=new Set();
  STARS.forEach(m=>{
    const r=Math.min(m.rankA,m.rankB);
    if(r>=5) return;
    done.add(m.id);
    pLabels.push({m, el:addDiv(r===0?'plbl p0':'plbl p1', `${m.id.split('/').pop()} <span class="lk">♥${fmtK(m.likes)}</span>`)});
  });
  TASKS.forEach((t,gi)=>{ // 은하별 다운로드 상위 3개는 흐린 라벨
    STARS.filter(m=>m.gA===gi&&!done.has(m.id)).sort((a,b)=>b.dl-a.dl).slice(0,3)
         .forEach(m=>{done.add(m.id); pLabels.push({m, el:addDiv('plbl p2', m.id.split('/').pop())});});
  });
}
function syncStarLabels(){
  starLabels.forEach(l=>l.el.remove()); starLabels=[]; selectionIds=new Set();
  if(!selected) return;
  selectionIds.add(selected.id);
  starLabels.push({m:selected, el:addDiv('lbl sel', selected.id)});
  related.forEach(r=>{ selectionIds.add(r.m.id); starLabels.push({m:r.m, el:addDiv('lbl', r.m.id.split('/').pop())}); });
}
/* ---- 마우스오버: 확대 라벨 + ♥ + README 1줄 요약(지연 로드) ---- */
const hoverEl = addDiv('hoverbox',''); hoverEl.style.display='none';
let hoverStar=null; const sumCache={};
async function fetchSummary(m){
  if(m.id in sumCache) return sumCache[m.id];
  sumCache[m.id]='';
  try{
    const t = await (await fetch(`https://huggingface.co/${m.id}/raw/main/README.md`)).text();
    const body = t.replace(/^---[\s\S]*?---/,'');
    const line = body.split('\n').map(s=>s.trim()).find(s=>s.length>25 && !/^[#!<\[\->`|*]/.test(s));
    sumCache[m.id] = line? line.replace(/[*_`#\[\]]/g,'').slice(0,90) : '';
  }catch(e){}
  return sumCache[m.id];
}
function setHover(m){
  if(hoverStar===m) return;
  hoverStar=m;
  canvas.style.cursor = m? 'pointer':'default';
  if(!m){ hoverEl.style.display='none'; return; }
  hoverEl.style.display='block';
  hoverEl.innerHTML = `<b>${m.id}</b><br><span class="dim">♥ ${m.likes.toLocaleString()} · ⬇ ${m.dl.toLocaleString()} · ${gNameA(m.gA)}</span><div class="sum">…</div>`;
  fetchSummary(m).then(s=>{ if(hoverStar===m) hoverEl.querySelector('.sum').textContent = s || T.noSummary; });
}
function projectLabels(){
  const w=innerWidth, h=innerHeight, tmp=new THREE.Vector3();
  const place=(el,p,dy)=>{ _v.copy(p).project(camera);
    const vis=_v.z<1 && Math.abs(_v.x)<1.15 && Math.abs(_v.y)<1.15;
    el.style.display=vis?'block':'none';
    if(vis){ el.style.left=(_v.x*.5+.5)*w+'px'; el.style.top=((-_v.y*.5+.5)*h+(dy||0))+'px'; } };
  starLabels.forEach(l=>place(l.el, starPos(l.m,uT,tmp)));
  pLabels.forEach(l=>{
    if(selectionIds.has(l.m.id) || l.m===hoverStar || l.m.visible===false){ l.el.style.display='none'; return; }
    place(l.el, starPos(l.m,uT,tmp));
  });
  galaxyLabels.forEach(l=>{ if(galaxyLabelHidden(l)){ l.el.style.display='none'; return; } place(l.el,l.pos); });
  if(hoverStar){ // 정보 카드는 별 위치에 앵커, 화면 밖이면 가장자리에 고정(멀리 연결된 별도 바로 확인)
    _v.copy(starPos(hoverStar,uT,tmp)).project(camera);
    if(_v.z<1){
      hoverEl.style.display='block';
      hoverEl.style.left = Math.max(120, Math.min(w-120, (_v.x*.5+.5)*w))+'px';
      hoverEl.style.top  = Math.max(90,  Math.min(h-30, (-_v.y*.5+.5)*h-8))+'px';
    } else hoverEl.style.display='none';
  }
}

/* ================= 카메라/조작 ================= */
let sph = {r:700, th:0, ph:1.35}, drag=null, camAnim=null;
function applyCam(){
  camera.position.set(
    target.x + sph.r*Math.sin(sph.ph)*Math.sin(sph.th),
    target.y + sph.r*Math.cos(sph.ph),
    target.z + sph.r*Math.sin(sph.ph)*Math.cos(sph.th));
  camera.lookAt(target);
}
canvas.addEventListener('pointerdown',e=>{ drag={x:e.clientX,y:e.clientY,moved:false}; });
addEventListener('pointermove',e=>{
  if(!drag){
    const s = pickAt(e.clientX,e.clientY);
    if(s){ hoverLineIdx=-1; setHover(s); }
    else{
      const L = pickLine(e.clientX,e.clientY); // 연결선 위 = 반대편 별 정보 미리보기
      hoverLineIdx = L? L.i : -1;
      setHover(L? L.m : null);
    }
    return;
  }
  const dx=e.clientX-drag.x, dy=e.clientY-drag.y;
  if(Math.abs(dx)+Math.abs(dy)>4) drag.moved=true;
  sph.th-=dx*.005; sph.ph=Math.max(.15,Math.min(3.0,sph.ph-dy*.005));
  drag.x=e.clientX; drag.y=e.clientY; camAnim=null; applyCam();
});
addEventListener('pointerup',e=>{
  if(drag && !drag.moved){
    let m = pickAt(e.clientX,e.clientY);
    if(!m){ const L=pickLine(e.clientX,e.clientY); if(L) m=L.m; }    // 선 클릭도 그 별로
    if(m){
      if(e.ctrlKey || e.metaKey) window.open('https://huggingface.co/'+m.id, '_blank'); // Ctrl+클릭 = HF 페이지
      else { select(m); syncStarLabels(); }                                             // 클릭 = 그 별로 이동
    }
  }
  drag=null;
});
canvas.addEventListener('wheel',e=>{ sph.r=Math.max(40,Math.min(2400,sph.r*(1+e.deltaY*.001))); camAnim=null; applyCam(); },{passive:true});
/* ---- WASD 우주 유영 (Shift = 가속) ---- */
const keys={};
addEventListener('keydown',e=>{
  if(document.activeElement && /^(INPUT|SELECT|TEXTAREA)$/.test(document.activeElement.tagName)) return;
  if(e.code==='Space'){ e.preventDefault(); jumpToHotStar(); return; } // 스페이스 = 핫한 별 랜덤 점프
  keys[e.key.toLowerCase()]=true;
});
function jumpToHotStar(){ // 필터 통과한 행성·중간 항성 중 랜덤
  const cands = STARS.filter(m=> m.visible!==false && (m.planet || m.size>6.5) && m!==selected);
  if(!cands.length) return;
  const m = cands[(Math.random()*cands.length)|0];
  select(m); syncStarLabels();
}
addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });
const _f=new THREE.Vector3(), _r=new THREE.Vector3(), _mv=new THREE.Vector3();
function moveWASD(dt){
  _f.copy(target).sub(camera.position).normalize();
  _r.crossVectors(_f, camera.up).normalize();
  _mv.set(0,0,0);
  if(keys['w']) _mv.add(_f); if(keys['s']) _mv.sub(_f);
  if(keys['d']) _mv.add(_r); if(keys['a']) _mv.sub(_r);
  if(_mv.lengthSq()){
    _mv.normalize().multiplyScalar(dt*(keys['shift']?420:150));
    target.add(_mv); camAnim=null; applyCam();
  }
}
function pickAt(px,py){
  let best=null, bd=15;
  const tmp=new THREE.Vector3();
  STARS.forEach(m=>{
    if(m.visible===false) return;
    starPos(m,uT,tmp).project(camera);
    if(tmp.z>1) return;
    const sx=(tmp.x*.5+.5)*innerWidth, sy=(-tmp.y*.5+.5)*innerHeight;
    const d=Math.hypot(sx-px,sy-py) - m.size*.5;
    if(d<bd){ bd=d; best=m; }
  });
  return best;
}
function flyTo(m){
  const to = starPos(m, mode, new THREE.Vector3());
  camAnim = {t0:performance.now(), from:target.clone(), to, r0:sph.r, r1:Math.min(420, Math.max(75, m.size*4))};
}

/* ================= 외부 모델 즉석 배치 ================= */
function placeExternal(m){ // 수집 목록에 없는 모델을 계보 가문 옆(없으면 태스크 은하)에 추가
  const parent = STARS.find(x=>x.id===m.family || x.family===m.family);
  m.gA = Math.max(0, TASKS.findIndex(t=>t.tag===m.pipe));
  m.gB = DOMAINS.findIndex(d=>d.key===inferDomain(m));
  m.seed=rng(); m.trend=m.trend||0; m.rankA=PER_TASK; m.rankB=PER_TASK; m.planet=0;
  m.posA = parent? parent.posA.map(v=>v+(rng()-.5)*18) : discPos(TASKS[m.gA].center, 40, PER_TASK, m.seed);
  m.posB = parent? parent.posB.map(v=>v+(rng()-.5)*18) : discPos(DOMAINS[m.gB].center, 25, 60, m.seed);
  m.size = starSize(m);
  m.delay = .3+m.seed*.2;
  m.colA = hsl(TASKS[m.gA].hue,.75,.72); m.colB = hsl(DOMAINS[m.gB].hue,.8,.34);
  STARS.push(m);
  scene.remove(starPoints); starPoints = buildPoints(STARS, 1); // 재빌드(데모 규모라 즉시)
  return m;
}

/* ================= 시작점: 지금 가장 핫한 모델 ================= */
async function startAtTrending(){
  try{
    const list = await (await fetch('https://huggingface.co/api/models?sort=trendingScore&limit=5')).json();
    if(!Array.isArray(list) || !list.length) return;
    const raw = list[0];
    const m = STARS.find(x=>x.id===raw.id) || placeExternal(parseModel(raw));
    if(!m.planet){ // 글로벌 트렌딩 1위는 무조건 행성급으로 승격
      m.planet=1; m.heat=1; m.size=rankBoost(0);
      scene.remove(starPoints); starPoints = buildPoints(STARS,1);
    }
    select(m); syncStarLabels();
    hotId = m.id;
    document.getElementById('hint').innerHTML = T.hintHot.replace('{id}', m.id);
  }catch(e){ /* 트렌딩 실패 시 그냥 전체 뷰에서 시작 */ }
}

async function search(){
  let q=document.getElementById('q').value.trim();
  if(!q) return;
  q=q.replace(/^https?:\/\/(www\.)?huggingface\.co\//,'').split('?')[0].replace(/\/(tree|blob)\/.*$/,'').replace(/\/$/,'');
  if(/^(datasets|spaces)\//.test(q)){ alert(T.alertModels); return; }
  let m = STARS.find(x=>x.id.toLowerCase()===q.toLowerCase())
       || STARS.find(x=>x.id.toLowerCase().includes(q.toLowerCase()));
  if(!m){ // 미수집 모델 → 실시간 조회 후 즉석 배치
    try{
      const raw = await (await fetch('https://huggingface.co/api/models/'+q)).json();
      if(!raw.id) throw 0;
      m = placeExternal(parseModel(raw));
    }catch(e){ alert(T.alertNotFound+q); return; }
  }

}

let activeTags = new Set(), activeGalaxy = null; // {uni:'A'|'B', gi}
let glowFA = TASKS.map(()=>1), glowFB = DOMAINS.map(()=>1);
function inGalaxy(m){
  return !activeGalaxy || (activeGalaxy.uni==='A'? m.gA===activeGalaxy.gi : m.gB===activeGalaxy.gi);
}
function paramsOf(m){ // 모델명에서 파라미터 수 추정 (7b, 0.6B, 125m 등)
  const s = m.id.split('/').pop().toLowerCase();
  let x = s.match(/(\d+(?:\.\d+)?)b(?![a-z0-9])/);
  if(x) return parseFloat(x[1])*1e9;
  x = s.match(/(\d+(?:\.\d+)?)m(?![a-z0-9])/);
  if(x && parseFloat(x[1])>=30) return parseFloat(x[1])*1e6;
  return null;
}
function estGB(m){ // 대략적 필요 메모리: fp16 2바이트/파라미터, gguf(양자화)면 0.7
  const p = paramsOf(m);
  if(p===null) return null;
  const bpp = m.tags.includes('gguf')? 0.7 : 2;
  return p*bpp/1e9*1.15;
}
const PERM_LIC = new Set(['apache-2.0','mit','bsd-3-clause','bsd-2-clause','cc-by-4.0','cc0-1.0','unlicense','openrail','bigscience-openrail-m']);
function applyFilters(){
  const memV  = +document.getElementById('memSel').value;
  const licV  = document.getElementById('licSel').value;
  const ageV  = +document.getElementById('ageSel').value;
  const langV = document.getElementById('langSel').value;
  const fmtV  = document.getElementById('fmtSel').value;
  const popV  = +document.getElementById('popRange').value;
  const popThr = popV? Math.pow(10, popV) : 0;
  // 선택 은하와 "연관된" 외부 별 판정용 집합 (계보·저자·데이터셋·논문 공유)
  let gFam=null, gAuth=null, gDs=null, gAx=null;
  if(activeGalaxy){
    gFam=new Set(); gAuth=new Set(); gDs=new Set(); gAx=new Set();
    STARS.filter(inGalaxy).forEach(m=>{
      gFam.add(m.family); gFam.add(m.id); gAuth.add(m.author);
      m.datasets.forEach(x=>gDs.add(x)); m.arxivs.forEach(x=>gAx.add(x));
    });
  }
  const relatedToGalaxy = m=>{
    if(gFam.has(m.family) || gFam.has(m.id) || gAuth.has(m.author)) return true;
    for(const x of m.datasets) if(gDs.has(x)) return true;
    for(const x of m.arxivs) if(gAx.has(x)) return true;
    return false;
  };
  STARS.forEach(m=>{
    const g = estGB(m);
    const passMem = !memV || g===null || g<=memV;
    let passTag = true; activeTags.forEach(t=>{ if(!m.info.has(t)) passTag=false; });
    const passLic = !licV || (licV==='perm'? PERM_LIC.has(m.lic) : !/nc/.test(m.lic||''));
    const passAge = !ageV || (m.ctime && (Date.now()-m.ctime) <= ageV*30.44*864e5);
    const nLang = m.tags.filter(x=>/^[a-z]{2}$/.test(x)).length;
    const passLang = !langV
      || (langV==='ko' && (m.tags.includes('ko') || /korean/i.test(m.id)))
      || (langV==='multi' && nLang>=3);
    const passFmt = !fmtV || m.tags.includes(fmtV);
    const passPop = !popThr || m.dl >= popThr;
    let galA = 1;                                  // 은하 소속 = 1
    if(activeGalaxy && !inGalaxy(m)) galA = relatedToGalaxy(m)? .45 : 0; // 연관 외부 별 = 반투명, 무관 = 숨김
    m.visAlpha = (passMem && passTag && passLic && passAge && passLang && passFmt && passPop)? galA : 0;
    m.visible = m.visAlpha > 0;
  });
  if(starPoints){
    const arr = starPoints.geometry.attributes.vis.array;
    STARS.forEach((m,i)=>arr[i]=m.visAlpha);
    starPoints.geometry.attributes.vis.needsUpdate = true;
  }
  if(dustPoints){ // 별먼지도 소속 별을 따라 숨김/반투명
    const arr = dustPoints.geometry.attributes.vis.array;
    DUST.forEach((d,i)=>arr[i]=d.src.visAlpha!==undefined? d.src.visAlpha : 1);
    dustPoints.geometry.attributes.vis.needsUpdate = true;
  }
  glowFA = TASKS.map((t,i)=> !activeGalaxy? 1 : (activeGalaxy.uni==='A'&&activeGalaxy.gi===i? 1 : .06));
  glowFB = DOMAINS.map((d,i)=> !activeGalaxy? 1 : (activeGalaxy.uni==='B'&&activeGalaxy.gi===i? 1 : .06));
}
function buildTagChips(){ // 태그 칩: 현재 은하 범위의 정보성 태그 빈도 상위 24개
  const box = document.getElementById('tagChips'); box.innerHTML='';
  const freq = {};
  STARS.filter(inGalaxy).forEach(m=>m.info.forEach(t=>{ if(!/^[a-z]{2}$/.test(t)) freq[t]=(freq[t]||0)+1; }));
  Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,24).forEach(([t,c])=>{
    const el = document.createElement('span'); el.className='chip'+(activeTags.has(t)?' on':''); el.textContent=`${t} ${c}`;
    el.onclick = ()=>{ el.classList.toggle('on');
      el.classList.contains('on')? activeTags.add(t) : activeTags.delete(t);
      applyFilters(); };
    box.appendChild(el);
  });
}
function fillGalaxySelect(){

  const og2 = document.createElement('optgroup'); og2.label=T.domainUni;

  gs.appendChild(og1); gs.appendChild(og2); gs.value=cur;
}
function buildFilters(){
  const gs = document.getElementById('galaxySel');
  fillGalaxySelect();
  gs.onchange = ()=>{ // 은하 선택 = 필터: 그 은하 별만 남기고, 트렌딩 1위 중심으로 재중심 + 태그 재계산
    const v = gs.value;
    if(!v){ activeGalaxy=null; activeTags.clear(); applyFilters(); buildTagChips(); return; }
    const uni = v[0], gi = +v.slice(1);
    activeGalaxy = {uni, gi};
    activeTags.clear(); // 은하가 바뀌면 태그 조건 초기화
    if((uni==='B') !== (mode===1)) switchMode(); // 필요하면 우주 전환부터
    applyFilters(); buildTagChips();
    const m = STARS.find(x=> uni==='A'? (x.gA===gi && x.rankA===0) : (x.gB===gi && x.rankB===0));
    if(m){ select(m); syncStarLabels(); }
  };
  ['memSel','licSel','ageSel','langSel','fmtSel'].forEach(id=>document.getElementById(id).onchange = applyFilters);
  const pr = document.getElementById('popRange');
  pr.oninput = ()=>{
    const v = +pr.value;
    document.getElementById('popVal').textContent = v? '⬇ '+fmtK(Math.pow(10,v))+'+' : T.all;
    applyFilters();
  };
  buildTagChips();
}

/* ================= 메인 루프 ================= */
let starPoints=null, lastNow=0;
function animate(now){
  requestAnimationFrame(animate);
  const dt = Math.min((now-lastNow)/1000, .05); lastNow = now;
  moveWASD(dt);
  if(transStart>=0){
    const p=Math.min((now-transStart)/TRANS_MS,1);
    uT = transFrom + (mode-transFrom)*p;
    if(p>=1) transStart=-1;
  }
  if(camAnim){
    const k=ease01((now-camAnim.t0)/1300);
    target.copy(camAnim.from).lerp(camAnim.to,k);
    sph.r=camAnim.r0+(camAnim.r1-camAnim.r0)*k;
    applyCam(); if(k>=1) camAnim=null;
  }
  materials.forEach(m=>{ m.uniforms.uT.value=uT; m.uniforms.uTime.value=now*.001; });
  if(nebulaMat){
    nebulaMat.uniforms.uT.value=uT; nebulaMat.uniforms.uTime.value=now*.001;
    nebulaMesh.position.copy(camera.position); // 유영해도 배경이 따라옴
  }
  const tE = ease01(uT);
  glowsA.forEach((s,i)=>s.material.opacity=.14*(1-tE)*glowFA[i]);
  glowsB.forEach((s,i)=>s.material.opacity=.14*tE*glowFB[i]);
  updateLines(); projectLabels();
  if(composer) composer.render();
  else renderer.render(scene,camera);
}
function resize(){
  renderer.setSize(innerWidth,innerHeight);
  if(composer) composer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
}
addEventListener('resize',resize);

/* ================= 시작 ================= */
(async ()=>{
  try{ await loadData(); }
  catch(e){ document.getElementById('loadMsg').textContent=T.loadFail; return; }
  document.getElementById('loading').remove();
  renderer.setClearColor(BG_DARK);
  buildNebula();
  buildGlows();
  starPoints = buildPoints(STARS,1);
  buildDust();
  setupComposer();
  makeLabels(); makePersistentLabels(); buildFilters(); resize(); applyCam();
  requestAnimationFrame(animate);
  startAtTrending(); // 시작 = 현재 트렌딩 1위 모델로 플라이인
})();
</script>
</body>
</html>
