<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Browser — HuggingFace 우주 (흑/백 전환 데모)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- three.js 공식 예제(MIT)의 블룸 후처리 — 별 빛번짐 -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --fg:#e9edfa; --fg-dim:#94a1c4; --panel:rgba(12,16,32,.55); --line:rgba(255,255,255,.09);
    --accent:#8ab8ff; --glow:rgba(96,140,255,.28); --shadow:rgba(0,0,0,.35);
  }
  body.light{
    --fg:#2e2820; --fg-dim:#8d8271; --panel:rgba(255,253,247,.62); --line:rgba(60,45,20,.13);
    --accent:#b0641e; --glow:rgba(190,120,40,.2); --shadow:rgba(80,60,30,.18);
  }
  *{box-sizing:border-box; margin:0}
  html,body{height:100%; overflow:hidden; background:#04060f}
  body{font-family:'Inter','Noto Sans KR','Apple SD Gothic Neo',sans-serif; color:var(--fg)}
  body, .panel, input, button{transition:color 5s, background-color 5s, border-color 5s, box-shadow 5s}
  #c{position:fixed; inset:0; display:block}
  .panel{position:fixed; background:var(--panel); border:1px solid var(--line); border-radius:16px;
    backdrop-filter:blur(18px) saturate(1.5); -webkit-backdrop-filter:blur(18px) saturate(1.5);
    box-shadow:0 8px 32px var(--shadow), inset 0 1px 0 rgba(255,255,255,.06); padding:10px 16px}
  #topbar{top:16px; left:50%; transform:translateX(-50%); display:flex; gap:8px; align-items:center; z-index:10; border-radius:999px; padding:8px 10px}
  #topbar input{width:min(420px,52vw); background:rgba(0,0,0,.001); border:1px solid var(--line); border-radius:999px; color:var(--fg); padding:8px 16px; font-size:13px; outline:none; font-family:inherit}
  #topbar input::placeholder{color:var(--fg-dim)}
  #topbar input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--glow)}
  button{background:transparent; color:var(--fg); border:1px solid var(--line); border-radius:999px; padding:8px 16px; font-size:13px; cursor:pointer; font-family:inherit; font-weight:600}
  button:hover{border-color:var(--accent); color:var(--accent); box-shadow:0 0 18px var(--glow)}
  #modeBtn{font-weight:700; min-width:120px}
  #info{left:14px; bottom:14px; max-width:320px; font-size:12.5px; line-height:1.55; display:none; z-index:10}
  #info h3{font-size:14px; margin-bottom:4px; word-break:break-all}
  #info a{color:var(--accent)}
  #info .dim{color:var(--fg-dim)}
  #legend{right:14px; bottom:14px; font-size:11.5px; line-height:1.7; color:var(--fg-dim); z-index:10}
  #legend b{color:var(--fg)}
  #hint{top:72px; left:50%; transform:translateX(-50%); font-size:11px; color:var(--fg-dim); z-index:9; padding:5px 14px; border-radius:999px; letter-spacing:.01em}
  #loading{position:fixed; inset:0; display:flex; flex-direction:column; gap:12px; align-items:center; justify-content:center; z-index:20; color:#9fb3dd; font-size:14px; background:#04060f}
  .lbl{position:fixed; transform:translate(-50%,-130%); font-size:11px; pointer-events:none; white-space:nowrap; color:var(--fg); text-shadow:0 0 6px rgba(0,0,0,.5); z-index:5}
  body.light .lbl{text-shadow:0 0 6px rgba(255,255,255,.7)}
  .glbl{position:fixed; transform:translate(-50%,-50%); font-size:12px; font-weight:600; letter-spacing:.35em; pointer-events:none; white-space:nowrap; color:var(--fg-dim); opacity:.7; z-index:4; transition:opacity 2.5s; text-transform:uppercase}
  .glbl::after{content:''; display:block; margin:4px auto 0; width:60%; height:1px; background:linear-gradient(90deg,transparent,var(--fg-dim),transparent); opacity:.4}
  .lbl.sel{font-weight:700; font-size:12.5px; color:var(--accent)}
  .plbl{position:fixed; transform:translate(-50%,-140%); pointer-events:none; white-space:nowrap; z-index:5; color:var(--fg); text-shadow:0 0 6px rgba(0,0,0,.55)}
  body.light .plbl{text-shadow:0 0 6px rgba(255,255,255,.75)}
  .plbl .lk{opacity:.75; font-weight:400; font-size:.82em}
  .p0{font-size:16.5px; font-weight:800; letter-spacing:.02em}
  .p1{font-size:12px; font-weight:600; opacity:.78}
  .p2{font-size:10px; opacity:.38}
  .hoverbox{position:fixed; transform:translate(-50%,-135%); z-index:12; pointer-events:none; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:8px 11px; font-size:12.5px; line-height:1.5; max-width:340px; white-space:normal; backdrop-filter:blur(8px)}
  .hoverbox .dim,.hoverbox .sum{color:var(--fg-dim)}
  .hoverbox .sum{font-size:11.5px; margin-top:3px}
</style>
</head>
<body class="dark">
<canvas id="c"></canvas>
<div id="loading"><div>HuggingFace 우주 생성 중…</div><div id="loadMsg" style="font-size:12px;color:#5f6f95">모델 메타데이터 수집</div></div>
<div id="topbar" class="panel">
  <input id="q" placeholder="huggingface.co 모델 링크 또는 org/model 입력 (예: Qwen/Qwen3-8B)">
  <button id="goBtn">탐색</button>
  <button id="modeBtn">☀ 백우주로</button>
</div>
<div id="hint" class="panel">클릭 = 이동 · Ctrl+클릭 = HF 열기 · WASD = 유영(Shift 가속) · 선 위 커서 = 반대편 별 정보</div>
<div id="info" class="panel"></div>
<div id="legend" class="panel"></div>

<script>
/* ================= 설정 ================= */
const TASKS = [ // 흑우주(태스크) 은하 — 모달리티끼리 인접 배치, image-to-text 등은 다리 은하
  {tag:'text-generation',              name:'텍스트 생성',   center:[-150, 15,-25], hue:210},
  {tag:'translation',                  name:'번역',         center:[-95,-35, 65], hue:190},
  {tag:'sentence-similarity',          name:'문장 유사도',   center:[-75, 55,-95], hue:230},
  {tag:'image-to-text',                name:'이미지→텍스트', center:[ 10, 25, 30], hue:280}, // Vision-NLP 다리
  {tag:'text-to-image',                name:'텍스트→이미지', center:[115, 35,-45], hue:320},
  {tag:'image-classification',         name:'이미지 분류',   center:[150,-25, 60], hue:0},
  {tag:'automatic-speech-recognition', name:'음성 인식',     center:[-25,-70,-85], hue:140}, // Audio
  {tag:'text-to-speech',               name:'음성 합성',     center:[ 40,-80, 45], hue:110},
];
const DOMAINS = [ // 백우주(응용 도메인) 은하 — 태그/이름/README 단서에서 추론(데모는 키워드 휴리스틱)
  {key:'code',  name:'코드·개발',      center:[-135, 30,-30], hue:215},
  {key:'bio',   name:'의료·생명',      center:[-60,-55, 90],  hue:150},
  {key:'lawfin',name:'법률·금융',      center:[ 25, 75,-110], hue:45},
  {key:'sci',   name:'수학·과학',      center:[110, 50, 55],  hue:265},
  {key:'chat',  name:'대화·어시스턴트', center:[-150,-30, 40], hue:200},
  {key:'art',   name:'예술·창작',      center:[140,-40,-60],  hue:325},
  {key:'voice', name:'음성·음악',      center:[ 45,-85, 30],  hue:120},
  {key:'embed', name:'검색·임베딩',    center:[-45, 80, 70],  hue:235},
  {key:'multi', name:'다국어',        center:[ 80, 10,-130], hue:185},
  {key:'gen',   name:'일반·범용',      center:[  0,  0,  0],  hue:30},
];
const PER_TASK = 50, TREND_N = 10, DUST_N = 12000, TRANS_MS = 5000;

/* ================= 도메인 추론 ================= */
function inferDomain(m){
  const t = (m.id + ' ' + m.tags.join(' ')).toLowerCase();
  const langCodes = m.tags.filter(x=>/^[a-z]{2}$/.test(x)).length;
  if(/(^|[^a-z])(code|coder|sql|starcoder|codellama|codegen)/.test(t)) return 'code';
  if(/(medic|biomed|bio[^a-z]|clinic|pubmed|protein|chem|health|drug)/.test(t)) return 'bio';
  if(/(legal|law[^a-z]|finance|financial|fingpt|stock)/.test(t)) return 'lawfin';
  if(/(math|theorem|physics|science|reason)/.test(t)) return 'sci';
  if(/(music|sing)/.test(t) || m.pipe==='automatic-speech-recognition' || m.pipe==='text-to-speech' || /(whisper|speech|voice|vits|tts)/.test(t)) return 'voice';
  if(m.pipe==='sentence-similarity' || /(embed|rerank|retrieval|bge-|gte-|e5-)/.test(t)) return 'embed';
  if(/(anime|waifu|cartoon|comic|artstyle|dreambooth|photoreal)/.test(t)) return 'art';
  if(langCodes>2 || m.pipe==='translation' || /(multilingual|korean|japanese|chinese)/.test(t)) return 'multi';
  if(m.tags.includes('conversational') || /(instruct|chat|assistant)/.test(t)) return 'chat';
  return 'gen';
}

/* ================= 유틸 ================= */
const STOP = /^(transformers|pytorch|tf|jax|safetensors|onnx|gguf|diffusers|endpoints_compatible|text-generation-inference|text-embeddings-inference|autotrain_compatible|eval-results|model-index|region:.*|license:.*|deploy:.*|base_model:.*|dataset:.*|arxiv:.*)$/;
function parseModel(raw){
  const tags = raw.tags||[];
  const fam = tags.filter(x=>x.startsWith('base_model:')&&!x.includes(':finetune:')&&!x.includes(':quantized:')&&!x.includes(':adapter:')&&!x.includes(':merge:')).map(x=>x.slice(11));
  return {
    id: raw.id, author: raw.id.split('/')[0], dl: raw.downloads||0, likes: raw.likes||0,
    pipe: raw.pipeline_tag, tags, created: (raw.createdAt||'').slice(0,4),
    family: fam[0] || raw.id,
    datasets: new Set(tags.filter(x=>x.startsWith('dataset:')).map(x=>x.slice(8))),
    arxivs: new Set(tags.filter(x=>x.startsWith('arxiv:'))),
    info: new Set(tags.filter(x=>!STOP.test(x))),
  };
}
function discPos(center, rank, n, rng){ // 은하 원반: 상위 모델일수록 중심 (중심부는 트렌딩 1위 자리라 비움)
  const r = 16 + 40*Math.pow(rank/Math.max(n-1,1), .72);
  const a = rank*2.399963 + r*.05 + rng*6.28;
  return [center[0]+r*Math.cos(a), center[1]+(rng-.5)*2*(4+r*.12), center[2]+r*Math.sin(a)];
}
function hsl(h,s,l){ const c=new THREE.Color(); c.setHSL(h/360,s,l); return c; }
function mulberry(seed){ return ()=>{ seed|=0; seed=seed+0x6D2B79F5|0; let z=Math.imul(seed^seed>>>15,1|seed); z=z+Math.imul(z^z>>>7,61|z)^z; return ((z^z>>>14)>>>0)/4294967296; }; }
const rng = mulberry(42);

/* ================= 데이터 수집 (HF API, CORS 허용) ================= */
let STARS = [];
async function loadData(){
  // 다운로드 상위(구조) + 트렌딩 상위(위계)를 태스크별로 동시 수집
  const dlQ = Promise.allSettled(TASKS.map(t=>fetch(`https://huggingface.co/api/models?filter=${t.tag}&sort=downloads&limit=${PER_TASK}`).then(r=>r.json())));
  const trQ = Promise.allSettled(TASKS.map(t=>fetch(`https://huggingface.co/api/models?filter=${t.tag}&sort=trendingScore&limit=${TREND_N}`).then(r=>r.json())));
  const [dlR, trR] = await Promise.all([dlQ, trQ]);
  const byId = new Map();
  const absorb = (res, gi)=>{
    if(res.status!=='fulfilled' || !Array.isArray(res.value)) return;
    res.value.forEach(raw=>{
      let m = byId.get(raw.id);
      if(!m){ m=parseModel(raw); m.gA=gi; m.trend=raw.trendingScore||0; m.seed=rng(); byId.set(raw.id,m); }
      else m.trend = Math.max(m.trend, raw.trendingScore||0);
    });
  };
  dlR.forEach(absorb); trR.forEach(absorb);
  STARS = [...byId.values()];
  if(STARS.length < 50) throw new Error('API 응답 부족');
  STARS.forEach(m=>{ m.gB = DOMAINS.findIndex(d=>d.key===inferDomain(m)); });
  layoutUniverse('A'); layoutUniverse('B');
  STARS.forEach(m=>{
    m.size = starSize(m);
    m.delay = (m.gA/TASKS.length)*.34 + Math.min(m.rankA/PER_TASK,1)*.18 + m.seed*.06; // 은하별 물결 + 순위 스태거
    m.colA = hsl(TASKS[m.gA].hue, .75, m.rankA<5?.85:.72);   // 흑우주: 밝은 별, 핫한 별은 더 밝게
    m.colB = hsl(DOMAINS[m.gB].hue, .8, m.rankB<5?.28:.34);  // 백우주: 종이 위 잉크 별
  });
}
function rankBoost(r){ return r===0? 130 : r<5? 85-9*r : 0; } // 1위=지구급(반지름 5배), 2~5위=위성은하급
function starSize(m){
  const base = 1.5 + Math.min(1, Math.log10(m.dl+1)/8.2)*3.2;   // 일반 별은 작게(달)
  return Math.max(base, rankBoost(m.rankA), rankBoost(m.rankB));
}
function layoutUniverse(which){ // 은하마다: 트렌딩 1위=중심, 2~5위=외곽 위성은하, 나머지=원반
  const GAL = which==='A'? TASKS : DOMAINS;
  GAL.forEach((gal,g)=>{
    const list = STARS.filter(m=> (which==='A'?m.gA:m.gB)===g)
                      .sort((a,b)=> (b.trend-a.trend) || (b.dl-a.dl));
    const ang = g*2.4 + (which==='A'?0:1.3);
    const satC = [gal.center[0]+Math.cos(ang)*68, gal.center[1]+12, gal.center[2]+Math.sin(ang)*68];
    list.forEach((m,i)=>{
      let p;
      if(i===0) p = gal.center.map(v=>v+(m.seed-.5)*4);
      else if(i<5){ const a2=i*1.57+m.seed*6.28;
        p = [satC[0]+Math.cos(a2)*(7+i*2), satC[1]+(m.seed-.5)*8, satC[2]+Math.sin(a2)*(7+i*2)];
      } else p = discPos(gal.center, i-5, list.length, m.seed);
      if(which==='A'){ m.posA=p; m.rankA=i; } else { m.posB=p; m.rankB=i; }
    });
  });
}

/* ================= 렌더러/셰이더 ================= */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, 1, .1, 4000);
camera.position.set(0, 90, 430);
const target = new THREE.Vector3(0,0,0);

const VSH = `
attribute vec3 posB; attribute vec3 colA; attribute vec3 colB;
attribute float size; attribute float delay; attribute float seed;
uniform float uT; uniform float uTime; uniform float uPix;
varying vec3 vColor; varying float vSeed; varying float vSize;
void main(){
  float k = clamp((uT - delay)/0.4, 0.0, 1.0);
  float s = k*k*(3.0-2.0*k);
  vec3 arc = normalize(vec3(sin(seed*12.9), cos(seed*7.7), sin(seed*5.3+1.7)));
  float d = distance(position, posB);
  vec3 p = mix(position, posB, s) + arc*sin(3.14159*s)*d*0.28;
  vColor = mix(colA, colB, s); vSeed = seed; vSize = size;
  vec4 mv = modelViewMatrix*vec4(p,1.0);
  float tw = 1.0 + 0.18*sin(uTime*2.2 + seed*80.0);
  gl_PointSize = min(size*tw*uPix*140.0/max(-mv.z,1.0), 700.0);
  gl_Position = projectionMatrix*mv;
}`;
const FSH = `
uniform float uAlpha; varying vec3 vColor; varying float vSeed; varying float vSize;
void main(){
  vec2 uv = gl_PointCoord - 0.5;
  float d = length(uv);
  float core = exp(-d*d*36.0);              // 뜨거운 중심핵
  float glow = exp(-d*4.2)*0.5;             // 부드러운 광륜
  float spikes = 0.0;
  if(vSize > 9.0){                          // 큰 별만 회절 스파이크(십자 빛줄기)
    float s1 = exp(-abs(uv.x)*28.0)*exp(-abs(uv.y)*5.0);
    float s2 = exp(-abs(uv.y)*28.0)*exp(-abs(uv.x)*5.0);
    spikes = (s1+s2)*smoothstep(0.5,0.05,d)*0.85;
  }
  float a = clamp(core+glow+spikes, 0.0, 1.0)*uAlpha;
  vec3 col = vColor*(0.8+core*1.1) + vec3(1.0)*core*0.4;
  gl_FragColor = vec4(col, a);
  if(a < 0.02) discard;
}`;
const materials = [];
function makeMat(alpha){
  const m = new THREE.ShaderMaterial({
    uniforms:{uT:{value:0}, uTime:{value:0}, uPix:{value:renderer.getPixelRatio()}, uAlpha:{value:alpha}},
    vertexShader:VSH, fragmentShader:FSH, transparent:true, depthWrite:false,
  });
  materials.push(m); return m;
}
function buildPoints(list, alpha){
  const n = list.length, g = new THREE.BufferGeometry();
  const pA=new Float32Array(n*3), pB=new Float32Array(n*3), cA=new Float32Array(n*3), cB=new Float32Array(n*3);
  const sz=new Float32Array(n), dl=new Float32Array(n), sd=new Float32Array(n);
  list.forEach((m,i)=>{
    pA.set(m.posA,i*3); pB.set(m.posB,i*3);
    cA.set([m.colA.r,m.colA.g,m.colA.b],i*3); cB.set([m.colB.r,m.colB.g,m.colB.b],i*3);
    sz[i]=m.size; dl[i]=m.delay; sd[i]=m.seed;
  });
  g.setAttribute('position',new THREE.BufferAttribute(pA,3));
  g.setAttribute('posB',new THREE.BufferAttribute(pB,3));
  g.setAttribute('colA',new THREE.BufferAttribute(cA,3));
  g.setAttribute('colB',new THREE.BufferAttribute(cB,3));
  g.setAttribute('size',new THREE.BufferAttribute(sz,1));
  g.setAttribute('delay',new THREE.BufferAttribute(dl,1));
  g.setAttribute('seed',new THREE.BufferAttribute(sd,1));
  const pts = new THREE.Points(g, makeMat(alpha));
  pts.frustumCulled = false;
  scene.add(pts); return pts;
}
function buildDust(){ // Tier2 개념: 실별 주변에 뿌리는 별먼지 (양쪽 좌표 모두 실별 기준 지터)
  const list=[];
  for(let i=0;i<DUST_N;i++){
    const m = STARS[(rng()*STARS.length)|0], j=()=> (rng()-.5)*26;
    const dim = .25+rng()*.3;
    list.push({posA:[m.posA[0]+j(),m.posA[1]+j()*.5,m.posA[2]+j()],
               posB:[m.posB[0]+j(),m.posB[1]+j()*.5,m.posB[2]+j()],
               colA:m.colA.clone().multiplyScalar(dim), colB:m.colB.clone().lerp(new THREE.Color('#f5f2ea'),.55),
               size:.8+rng()*1.4, delay:m.delay+(rng()-.5)*.08, seed:rng()});
  }
  return buildPoints(list, .35);
}

/* ================= 성운 배경 (fBm 노이즈 셰이더) ================= */
let nebulaMat=null, nebulaMesh=null;
function buildNebula(){
  nebulaMat = new THREE.ShaderMaterial({side:THREE.BackSide, depthWrite:false,
    uniforms:{uT:{value:0}, uTime:{value:0}},
    vertexShader:`varying vec3 vP; void main(){vP=normalize(position); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`
      varying vec3 vP; uniform float uT; uniform float uTime;
      float h(vec3 p){return fract(sin(dot(p,vec3(127.1,311.7,74.7)))*43758.5453);}
      float n(vec3 p){vec3 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
        return mix(mix(mix(h(i),h(i+vec3(1,0,0)),f.x),mix(h(i+vec3(0,1,0)),h(i+vec3(1,1,0)),f.x),f.y),
                   mix(mix(h(i+vec3(0,0,1)),h(i+vec3(1,0,1)),f.x),mix(h(i+vec3(0,1,1)),h(i+vec3(1,1,1)),f.x),f.y),f.z);}
      float fbm(vec3 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*n(p);p*=2.13;a*=.5;}return v;}
      void main(){
        float f1=fbm(vP*3.2+uTime*.006);
        float f2=fbm(vP*6.5-uTime*.004+13.7);
        vec3 dark = vec3(.010,.016,.045)
          + vec3(.11,.05,.24)*pow(f1,2.2)     // 보랏빛 성운
          + vec3(.02,.09,.15)*pow(f2,2.6);    // 청록 가스
        vec3 light = vec3(.965,.950,.918)
          - vec3(.055,.045,.02)*pow(f1,2.0)*.8  // 종이 위 옅은 얼룩
          - vec3(.025)*pow(f2,2.5);
        float t=uT*uT*(3.-2.*uT);
        gl_FragColor = vec4(mix(dark,light,t),1.);
      }`});
  nebulaMesh = new THREE.Mesh(new THREE.SphereGeometry(1900,48,48), nebulaMat);
  nebulaMesh.frustumCulled=false; nebulaMesh.renderOrder=-1; scene.add(nebulaMesh);
}

/* ================= 블룸 후처리 (three.js 예제, MIT) ================= */
let composer=null, bloomPass=null;
function setupComposer(){
  try{
    if(!THREE.EffectComposer || !THREE.UnrealBloomPass) return;
    composer = new THREE.EffectComposer(renderer);
    composer.addPass(new THREE.RenderPass(scene, camera));
    bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 1.1, 0.55, 0.8);
    composer.addPass(bloomPass);
  }catch(e){ composer=null; }
}

/* ================= 우주 전환 (흑↔백) ================= */
const BG_DARK = new THREE.Color('#04060f'), BG_LIGHT = new THREE.Color('#f5f2ea');
let mode = 0;          // 0=흑(태스크), 1=백(도메인)
let uT = 0, transFrom = 0, transStart = -1;
function switchMode(){
  transFrom = uT; transStart = performance.now();
  mode = 1-mode;
  document.body.className = mode? 'light':'dark';
  document.getElementById('modeBtn').textContent = mode? '☾ 흑우주로':'☀ 백우주로';
  galaxyLabels.forEach(l=>{ l.el.style.opacity = (l.uni===mode)? .75 : 0; });
}
function ease01(x){ return x<0?0:x>1?1:x*x*(3-2*x); }
function starPos(m, t, out){ // 셰이더와 동일한 경로를 CPU에서 재현 (라벨·연결선·피킹용)
  const k = ease01((t - m.delay)/0.4);
  const ax=Math.sin(m.seed*12.9), ay=Math.cos(m.seed*7.7), az=Math.sin(m.seed*5.3+1.7);
  const al=Math.sqrt(ax*ax+ay*ay+az*az);
  const dx=m.posB[0]-m.posA[0], dy=m.posB[1]-m.posA[1], dz=m.posB[2]-m.posA[2];
  const d=Math.sqrt(dx*dx+dy*dy+dz*dz), arc=Math.sin(Math.PI*k)*d*0.28/al;
  out.set(m.posA[0]+dx*k+ax*arc, m.posA[1]+dy*k+ay*arc, m.posA[2]+dz*k+az*arc);
  return out;
}

/* ================= 연관 별 연결 ================= */
let selected=null, related=[], lineStrong=null, lineWeak=null, hoverLine=null, hoverLineIdx=-1;
function relScore(a,b){
  let s=0;
  if(a.family===b.family) s+=5;
  if(a.family===b.id || b.family===a.id) s+=6;
  let shared=0; a.datasets.forEach(x=>{if(b.datasets.has(x))shared++;}); s+=Math.min(shared,3)*2;
  let ax=0; a.arxivs.forEach(x=>{if(b.arxivs.has(x))ax++;}); s+=Math.min(ax,2)*2;
  if(a.author===b.author) s+=1.5;
  let ov=0; a.info.forEach(x=>{if(b.info.has(x))ov++;}); s+=Math.min(ov,4)*.35;
  if(a.gA===b.gA) s+=.4;
  if(s<1) return 0;
  return s*(1+Math.log10(b.dl+1)/4); // 연관성 × 인기 가중
}
function select(m){
  selected = m;
  related = STARS.filter(x=>x!==m).map(x=>({m:x, s:relScore(m,x)}))
                 .filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,10);
  rebuildLines(); renderInfo(m); flyTo(m);
}
function rebuildLines(){
  [lineStrong,lineWeak].forEach(l=>{ if(l){scene.remove(l); l.geometry.dispose();} });
  lineStrong=lineWeak=null;
  if(!selected) return;
  const mk=(pairs,op)=>{
    if(!pairs.length) return null;
    const g=new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pairs.length*6),3));
    const l=new THREE.LineSegments(g, new THREE.LineBasicMaterial({color:mode?0x6b5433:0x9db8ee, transparent:true, opacity:op}));
    l.frustumCulled=false; scene.add(l); return l;
  };
  lineStrong = mk(related.filter(r=>r.s>=6), .85);
  lineWeak   = mk(related.filter(r=>r.s<6),  .28);
  hoverLineIdx = -1; if(hoverLine) hoverLine.visible=false;
}
/* 선에 커서를 올리면 그 선을 3중 평행선으로 두껍게 강조 */
function ensureHoverLine(){
  if(hoverLine) return;
  const g=new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(new Float32Array(18),3));
  hoverLine=new THREE.LineSegments(g, new THREE.LineBasicMaterial({transparent:true, opacity:1}));
  hoverLine.frustumCulled=false; scene.add(hoverLine);
}
function segDist(px,py,x1,y1,x2,y2){
  const dx=x2-x1, dy=y2-y1, l2=dx*dx+dy*dy;
  let t=l2? ((px-x1)*dx+(py-y1)*dy)/l2 : 0; t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(x1+dx*t), py-(y1+dy*t));
}
function pickLine(px,py){ // 연결선 근처(7px) 커서 → 반대편 별 반환
  if(!selected || !related.length) return null;
  const w=innerWidth, h=innerHeight;
  const a = starPos(selected,uT,new THREE.Vector3()).project(camera);
  if(a.z>1) return null;
  const ax=(a.x*.5+.5)*w, ay=(-a.y*.5+.5)*h;
  let bi=-1, bd=7;
  const tmp=new THREE.Vector3();
  related.forEach((r,i)=>{
    starPos(r.m,uT,tmp).project(camera);
    if(tmp.z>1) return;
    const d = segDist(px,py, ax,ay, (tmp.x*.5+.5)*w, (-tmp.y*.5+.5)*h);
    if(d<bd){ bd=d; bi=i; }
  });
  return bi>=0? {m:related[bi].m, i:bi} : null;
}
const _v = new THREE.Vector3();
function updateLines(){
  if(!selected) return;
  const sp = starPos(selected, uT, new THREE.Vector3());
  const fill=(line,list)=>{
    if(!line) return;
    const arr=line.geometry.attributes.position.array;
    list.forEach((r,i)=>{ starPos(r.m,uT,_v); arr.set([sp.x,sp.y,sp.z,_v.x,_v.y,_v.z],i*6); });
    line.geometry.attributes.position.needsUpdate=true;
    line.material.color.set(mode?0x6b5433:0x9db8ee);
  };
  fill(lineStrong, related.filter(r=>r.s>=6));
  fill(lineWeak,   related.filter(r=>r.s<6));
  ensureHoverLine();
  if(hoverLineIdx>=0 && related[hoverLineIdx]){
    hoverLine.visible = true;
    hoverLine.material.color.set(mode? 0xb0641e : 0x7fb4ff);
    const tp = starPos(related[hoverLineIdx].m, uT, new THREE.Vector3());
    const dir = _v.copy(tp).sub(sp).normalize();
    const camDir = new THREE.Vector3().subVectors(target, camera.position).normalize();
    let off = new THREE.Vector3().crossVectors(dir, camDir);
    if(off.lengthSq()<1e-6) off.crossVectors(dir, camera.up);
    off.normalize().multiplyScalar(camera.position.distanceTo(sp)*0.0035);
    const arr = hoverLine.geometry.attributes.position.array;
    [[0,0,0],[off.x,off.y,off.z],[-off.x,-off.y,-off.z]].forEach((o,i)=>{
      arr.set([sp.x+o[0],sp.y+o[1],sp.z+o[2], tp.x+o[0],tp.y+o[1],tp.z+o[2]], i*6);
    });
    hoverLine.geometry.attributes.position.needsUpdate = true;
  } else hoverLine.visible = false;
}

/* ================= 라벨 ================= */
let starLabels=[], galaxyLabels=[], pLabels=[], selectionIds=new Set();
function addDiv(cls, html){ const e=document.createElement('div'); e.className=cls; e.innerHTML=html; document.body.appendChild(e); return e; }
function fmtK(n){ return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':''+n; }
function makeLabels(){
  TASKS.forEach(t=>galaxyLabels.push({uni:0, pos:new THREE.Vector3(...t.center), el:addDiv('glbl',t.name)}));
  DOMAINS.forEach(d=>galaxyLabels.push({uni:1, pos:new THREE.Vector3(...d.center), el:addDiv('glbl',d.name)}));
  galaxyLabels.forEach(l=>{ l.el.style.opacity = l.uni===0? .75:0; });
}
function makePersistentLabels(){ // 주요 별 상시 라벨: 클수록 크고 진하게, 하위 티어는 없음
  const done=new Set();
  STARS.forEach(m=>{
    const r=Math.min(m.rankA,m.rankB);
    if(r>=5) return;
    done.add(m.id);
    pLabels.push({m, el:addDiv(r===0?'plbl p0':'plbl p1', `${m.id.split('/').pop()} <span class="lk">♥${fmtK(m.likes)}</span>`)});
  });
  TASKS.forEach((t,gi)=>{ // 은하별 다운로드 상위 3개는 흐린 라벨
    STARS.filter(m=>m.gA===gi&&!done.has(m.id)).sort((a,b)=>b.dl-a.dl).slice(0,3)
         .forEach(m=>{done.add(m.id); pLabels.push({m, el:addDiv('plbl p2', m.id.split('/').pop())});});
  });
}
function syncStarLabels(){
  starLabels.forEach(l=>l.el.remove()); starLabels=[]; selectionIds=new Set();
  if(!selected) return;
  selectionIds.add(selected.id);
  starLabels.push({m:selected, el:addDiv('lbl sel', selected.id)});
  related.forEach(r=>{ selectionIds.add(r.m.id); starLabels.push({m:r.m, el:addDiv('lbl', r.m.id.split('/').pop())}); });
}
/* ---- 마우스오버: 확대 라벨 + ♥ + README 1줄 요약(지연 로드) ---- */
const hoverEl = addDiv('hoverbox',''); hoverEl.style.display='none';
let hoverStar=null; const sumCache={};
async function fetchSummary(m){
  if(m.id in sumCache) return sumCache[m.id];
  sumCache[m.id]='';
  try{
    const t = await (await fetch(`https://huggingface.co/${m.id}/raw/main/README.md`)).text();
    const body = t.replace(/^---[\s\S]*?---/,'');
    const line = body.split('\n').map(s=>s.trim()).find(s=>s.length>25 && !/^[#!<\[\->`|*]/.test(s));
    sumCache[m.id] = line? line.replace(/[*_`#\[\]]/g,'').slice(0,90) : '';
  }catch(e){}
  return sumCache[m.id];
}
function setHover(m){
  if(hoverStar===m) return;
  hoverStar=m;
  canvas.style.cursor = m? 'pointer':'default';
  if(!m){ hoverEl.style.display='none'; return; }
  hoverEl.style.display='block';
  hoverEl.innerHTML = `<b>${m.id}</b><br><span class="dim">♥ ${m.likes.toLocaleString()} · ⬇ ${m.dl.toLocaleString()} · ${TASKS[m.gA].name}</span><div class="sum">…</div>`;
  fetchSummary(m).then(s=>{ if(hoverStar===m) hoverEl.querySelector('.sum').textContent = s || '(README 요약 없음)'; });
}
function projectLabels(){
  const w=innerWidth, h=innerHeight, tmp=new THREE.Vector3();
  const place=(el,p,dy)=>{ _v.copy(p).project(camera);
    const vis=_v.z<1 && Math.abs(_v.x)<1.15 && Math.abs(_v.y)<1.15;
    el.style.display=vis?'block':'none';
    if(vis){ el.style.left=(_v.x*.5+.5)*w+'px'; el.style.top=((-_v.y*.5+.5)*h+(dy||0))+'px'; } };
  starLabels.forEach(l=>place(l.el, starPos(l.m,uT,tmp)));
  pLabels.forEach(l=>{
    if(selectionIds.has(l.m.id) || l.m===hoverStar){ l.el.style.display='none'; return; }
    place(l.el, starPos(l.m,uT,tmp));
  });
  galaxyLabels.forEach(l=>place(l.el,l.pos));
  if(hoverStar){ // 정보 카드는 별 위치에 앵커, 화면 밖이면 가장자리에 고정(멀리 연결된 별도 바로 확인)
    _v.copy(starPos(hoverStar,uT,tmp)).project(camera);
    if(_v.z<1){
      hoverEl.style.display='block';
      hoverEl.style.left = Math.max(120, Math.min(w-120, (_v.x*.5+.5)*w))+'px';
      hoverEl.style.top  = Math.max(90,  Math.min(h-30, (-_v.y*.5+.5)*h-8))+'px';
    } else hoverEl.style.display='none';
  }
}

/* ================= 카메라/조작 ================= */
let sph = {r:440, th:0, ph:1.35}, drag=null, camAnim=null;
function applyCam(){
  camera.position.set(
    target.x + sph.r*Math.sin(sph.ph)*Math.sin(sph.th),
    target.y + sph.r*Math.cos(sph.ph),
    target.z + sph.r*Math.sin(sph.ph)*Math.cos(sph.th));
  camera.lookAt(target);
}
canvas.addEventListener('pointerdown',e=>{ drag={x:e.clientX,y:e.clientY,moved:false}; });
addEventListener('pointermove',e=>{
  if(!drag){
    const s = pickAt(e.clientX,e.clientY);
    if(s){ hoverLineIdx=-1; setHover(s); }
    else{
      const L = pickLine(e.clientX,e.clientY); // 연결선 위 = 반대편 별 정보 미리보기
      hoverLineIdx = L? L.i : -1;
      setHover(L? L.m : null);
    }
    return;
  }
  const dx=e.clientX-drag.x, dy=e.clientY-drag.y;
  if(Math.abs(dx)+Math.abs(dy)>4) drag.moved=true;
  sph.th-=dx*.005; sph.ph=Math.max(.15,Math.min(3.0,sph.ph-dy*.005));
  drag.x=e.clientX; drag.y=e.clientY; camAnim=null; applyCam();
});
addEventListener('pointerup',e=>{
  if(drag && !drag.moved){
    let m = pickAt(e.clientX,e.clientY);
    if(!m){ const L=pickLine(e.clientX,e.clientY); if(L) m=L.m; }    // 선 클릭도 그 별로
    if(m){
      if(e.ctrlKey || e.metaKey) window.open('https://huggingface.co/'+m.id, '_blank'); // Ctrl+클릭 = HF 페이지
      else { select(m); syncStarLabels(); }                                             // 클릭 = 그 별로 이동
    }
  }
  drag=null;
});
canvas.addEventListener('wheel',e=>{ sph.r=Math.max(40,Math.min(1500,sph.r*(1+e.deltaY*.001))); camAnim=null; applyCam(); },{passive:true});
/* ---- WASD 우주 유영 (Shift = 가속) ---- */
const keys={};
addEventListener('keydown',e=>{ if(document.activeElement && document.activeElement.tagName==='INPUT') return; keys[e.key.toLowerCase()]=true; });
addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });
const _f=new THREE.Vector3(), _r=new THREE.Vector3(), _mv=new THREE.Vector3();
function moveWASD(dt){
  _f.copy(target).sub(camera.position).normalize();
  _r.crossVectors(_f, camera.up).normalize();
  _mv.set(0,0,0);
  if(keys['w']) _mv.add(_f); if(keys['s']) _mv.sub(_f);
  if(keys['d']) _mv.add(_r); if(keys['a']) _mv.sub(_r);
  if(_mv.lengthSq()){
    _mv.normalize().multiplyScalar(dt*(keys['shift']?420:150));
    target.add(_mv); camAnim=null; applyCam();
  }
}
function pickAt(px,py){
  let best=null, bd=15;
  const tmp=new THREE.Vector3();
  STARS.forEach(m=>{
    starPos(m,uT,tmp).project(camera);
    if(tmp.z>1) return;
    const sx=(tmp.x*.5+.5)*innerWidth, sy=(-tmp.y*.5+.5)*innerHeight;
    const d=Math.hypot(sx-px,sy-py) - m.size*.5;
    if(d<bd){ bd=d; best=m; }
  });
  return best;
}
function flyTo(m){
  const to = starPos(m, mode, new THREE.Vector3());
  camAnim = {t0:performance.now(), from:target.clone(), to, r0:sph.r, r1:Math.min(420, Math.max(75, m.size*4))};
}

/* ================= 외부 모델 즉석 배치 ================= */
function placeExternal(m){ // 수집 목록에 없는 모델을 계보 가문 옆(없으면 태스크 은하)에 추가
  const parent = STARS.find(x=>x.id===m.family || x.family===m.family);
  m.gA = Math.max(0, TASKS.findIndex(t=>t.tag===m.pipe));
  m.gB = DOMAINS.findIndex(d=>d.key===inferDomain(m));
  m.seed=rng(); m.trend=m.trend||0; m.rankA=PER_TASK; m.rankB=PER_TASK;
  m.posA = parent? parent.posA.map(v=>v+(rng()-.5)*18) : discPos(TASKS[m.gA].center, 40, PER_TASK, m.seed);
  m.posB = parent? parent.posB.map(v=>v+(rng()-.5)*18) : discPos(DOMAINS[m.gB].center, 25, 60, m.seed);
  m.size = starSize(m);
  m.delay = .3+m.seed*.2;
  m.colA = hsl(TASKS[m.gA].hue,.75,.72); m.colB = hsl(DOMAINS[m.gB].hue,.8,.34);
  STARS.push(m);
  scene.remove(starPoints); starPoints = buildPoints(STARS, 1); // 재빌드(데모 규모라 즉시)
  return m;
}

/* ================= 시작점: 지금 가장 핫한 모델 ================= */
async function startAtTrending(){
  try{
    const list = await (await fetch('https://huggingface.co/api/models?sort=trendingScore&limit=5')).json();
    if(!Array.isArray(list) || !list.length) return;
    const raw = list[0];
    const m = STARS.find(x=>x.id===raw.id) || placeExternal(parseModel(raw));
    select(m); syncStarLabels();
    const hint=document.getElementById('hint');
    hint.innerHTML = `🔥 지금 가장 핫한 별에서 시작: <b>${m.id}</b> | 클릭=이동 · Ctrl+클릭=HF 열기 · WASD=유영`;
  }catch(e){ /* 트렌딩 실패 시 그냥 전체 뷰에서 시작 */ }
}

/* ================= 검색 ================= */
async function search(){
  let q=document.getElementById('q').value.trim();
  if(!q) return;
  q=q.replace(/^https?:\/\/(www\.)?huggingface\.co\//,'').split('?')[0].replace(/\/(tree|blob)\/.*$/,'').replace(/\/$/,'');
  if(/^(datasets|spaces)\//.test(q)){ alert('데모는 모델 링크만 지원해요.'); return; }
  let m = STARS.find(x=>x.id.toLowerCase()===q.toLowerCase())
       || STARS.find(x=>x.id.toLowerCase().includes(q.toLowerCase()));
  if(!m){ // 미수집 모델 → 실시간 조회 후 즉석 배치
    try{
      const raw = await (await fetch('https://huggingface.co/api/models/'+q)).json();
      if(!raw.id) throw 0;
      m = placeExternal(parseModel(raw));
    }catch(e){ alert('모델을 찾지 못했어요: '+q); return; }
  }
  select(m); syncStarLabels();
}
document.getElementById('goBtn').onclick=search;
document.getElementById('q').addEventListener('keydown',e=>{ if(e.key==='Enter') search(); });
document.getElementById('modeBtn').onclick=switchMode;

/* ================= 정보 패널 ================= */
function renderInfo(m){
  const el=document.getElementById('info');
  el.style.display='block';
  el.innerHTML = `<h3>${m.id}</h3>
   <div class="dim">${TASKS[m.gA].name} 은하 · ${DOMAINS[m.gB].name} (백우주) · ${m.created||'?'}년</div>
   <div>다운로드 <b>${m.dl.toLocaleString()}</b> · ♥ ${m.likes.toLocaleString()}</div>
   <div class="dim">연관 별 ${related.length}개 연결됨 (실선=강한 연관)</div>
   <a href="https://huggingface.co/${m.id}" target="_blank">HuggingFace에서 열기 ↗</a>`;
}
document.getElementById('legend').innerHTML =
  `<b>거대 별</b> = 은하 트렌딩 1위 (은하 중심)<br><b>위성 은하</b> = 트렌딩 2~5위 (외곽)<br>작은 별 = 다운로드 기준 · 별먼지 = Tier2`;

/* ================= 메인 루프 ================= */
let starPoints=null, lastNow=0;
function animate(now){
  requestAnimationFrame(animate);
  const dt = Math.min((now-lastNow)/1000, .05); lastNow = now;
  moveWASD(dt);
  if(transStart>=0){
    const p=Math.min((now-transStart)/TRANS_MS,1);
    uT = transFrom + (mode-transFrom)*p;
    renderer.setClearColor(BG_DARK.clone().lerp(BG_LIGHT, ease01(uT)));
    if(p>=1) transStart=-1;
  }
  if(camAnim){
    const k=ease01((now-camAnim.t0)/1300);
    target.copy(camAnim.from).lerp(camAnim.to,k);
    sph.r=camAnim.r0+(camAnim.r1-camAnim.r0)*k;
    applyCam(); if(k>=1) camAnim=null;
  }
  materials.forEach(m=>{ m.uniforms.uT.value=uT; m.uniforms.uTime.value=now*.001; });
  if(nebulaMat){
    nebulaMat.uniforms.uT.value=uT; nebulaMat.uniforms.uTime.value=now*.001;
    nebulaMesh.position.copy(camera.position); // 유영해도 배경이 따라옴
  }
  updateLines(); projectLabels();
  if(composer){
    if(bloomPass) bloomPass.strength = 1.1*(1-ease01(uT)); // 백우주(종이)에선 블룸 끔
    composer.render();
  } else renderer.render(scene,camera);
}
function resize(){
  renderer.setSize(innerWidth,innerHeight);
  if(composer) composer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
}
addEventListener('resize',resize);

/* ================= 시작 ================= */
(async ()=>{
  try{ await loadData(); }
  catch(e){ document.getElementById('loadMsg').textContent='HF API 접속 실패 — 네트워크를 확인하세요'; return; }
  document.getElementById('loading').remove();
  renderer.setClearColor(BG_DARK);
  buildNebula();
  starPoints = buildPoints(STARS,1);
  buildDust();
  setupComposer();
  makeLabels(); makePersistentLabels(); resize(); applyCam();
  requestAnimationFrame(animate);
  startAtTrending(); // 시작 = 현재 트렌딩 1위 모델로 플라이인
})();
</script>
</body>
</html>
